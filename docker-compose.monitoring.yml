name: 7d-monitoring

# Production observability stack: Prometheus + Alertmanager + Grafana.
#
# Start AFTER the platform and services stacks:
#   docker compose -f docker-compose.monitoring.yml up -d
#
# In production, all ports are firewalled by UFW (bound to 127.0.0.1).
# Access via SSH tunnel:
#   ssh -L 9091:localhost:9091 deploy@prod.7dsolutions.example.com   # Prometheus
#   ssh -L 9094:localhost:9094 deploy@prod.7dsolutions.example.com   # Alertmanager
#   ssh -L 3002:localhost:3002 deploy@prod.7dsolutions.example.com   # Grafana
#
# Prometheus scrapes /metrics from all platform services on the 7d-platform network.
# Alert rules live in infra/monitoring/alerts/*.yml.
# Alertmanager config: infra/monitoring/alertmanager.yml
# Grafana dashboards live in infra/monitoring/grafana/dashboards/*.json.

services:
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: 7d-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=:9093'
    volumes:
      - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9094:9093"
    networks:
      - 7d-platform
    labels:
      com.7dsolutions.project: "platform"
      com.7dsolutions.tier: "monitoring"
      com.7dsolutions.component: "alertmanager"
      com.7dsolutions.env: "production"

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: 7d-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9091:9090"
    networks:
      - 7d-platform
    depends_on:
      - alertmanager
    labels:
      com.7dsolutions.project: "platform"
      com.7dsolutions.tier: "monitoring"
      com.7dsolutions.component: "prometheus"
      com.7dsolutions.env: "production"

  grafana:
    image: grafana/grafana:10.2.3
    container_name: 7d-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/billing-unknown.json
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3002:3000"
    networks:
      - 7d-platform
    depends_on:
      - prometheus
    labels:
      com.7dsolutions.project: "platform"
      com.7dsolutions.tier: "monitoring"
      com.7dsolutions.component: "grafana"
      com.7dsolutions.env: "production"

volumes:
  alertmanager_data:
    name: 7d-alertmanager-data
  prometheus_data:
    name: 7d-prometheus-data
  grafana_data:
    name: 7d-grafana-data

networks:
  7d-platform:
    name: 7d-platform
    external: true
