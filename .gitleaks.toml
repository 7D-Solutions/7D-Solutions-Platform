# gitleaks configuration for 7D-Solutions Platform
#
# Inherits the full gitleaks default rule set via `useDefault = true`.
#
# Allowlist entries require a bead ID and a reason.
# See docs/security/vuln-triage.md for format.
#
# To add an entry, uncomment and populate the [[allowlists]] table below.
# At least one of commits, paths, regexes, or stopwords is required per
# allowlist — leaving them all empty breaks config loading.

[extend]
  useDefault = true

# Example allowlist (leave commented until an entry is actually needed):
#
# [[allowlists]]
#   description = "Test fixture RSA keys — bd-xxxxx"
#   paths = ['''e2e-tests/tests/fixtures/.*\.pem''']

[[allowlists]]
  description = "Publish gate bypass token is a public escape-hatch marker, not a secret — bd-91xyd"
  regexes = ['''BR_PUBLISH_GATE_BYPASS=1''']
