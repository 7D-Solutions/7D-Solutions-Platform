name: 7d-services

services:
  # =========================
  # IDENTITY & AUTH (2 instances)
  # =========================
  auth-1:
    container_name: 7d-auth-1
    image: 7d-runtime
    restart: unless-stopped
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      DATABASE_URL: postgres://${AUTH_POSTGRES_USER:-auth_user}:${AUTH_POSTGRES_PASSWORD:-auth_pass}@7d-auth-postgres:5432/${AUTH_POSTGRES_DB:-auth_db}?sslmode=require
      NATS_URL: nats://platform:${NATS_AUTH_TOKEN:-dev-nats-token}@7d-nats:4222
      HOST: 0.0.0.0
      PORT: 8080
      JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM}
      JWT_KID: ${JWT_KID:-auth-key-1}
      ACCESS_TOKEN_TTL_MINUTES: "15"
      REFRESH_TOKEN_TTL_DAYS: "14"
      ARGON_MEMORY_KB: "65536"
      ARGON_ITERATIONS: "3"
      ARGON_PARALLELISM: "1"
      MAX_CONCURRENT_HASHES: "50"
      HASH_ACQUIRE_TIMEOUT_MS: "5000"
      LOCKOUT_THRESHOLD: "10"
      LOCKOUT_MINUTES: "15"
      LOGIN_PER_MIN_PER_EMAIL: "5"
      REGISTER_PER_MIN_PER_EMAIL: "5"
      REFRESH_PER_MIN_PER_TOKEN: "20"
      TENANT_REGISTRY_URL: http://7d-control-plane:8091
      RUST_LOG: info,auth_rs=debug
    networks:
      - 7d-platform
    labels:
      com.7dsolutions.project: "platform"
      com.7dsolutions.tier: "platform"
      com.7dsolutions.component: "auth"
      com.7dsolutions.type: "api"
      com.7dsolutions.env: "dev"
      com.7dsolutions.instance: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  auth-2:
    container_name: 7d-auth-2
    image: 7d-runtime
    restart: unless-stopped
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      DATABASE_URL: postgres://${AUTH_POSTGRES_USER:-auth_user}:${AUTH_POSTGRES_PASSWORD:-auth_pass}@7d-auth-postgres:5432/${AUTH_POSTGRES_DB:-auth_db}?sslmode=require
      NATS_URL: nats://platform:${NATS_AUTH_TOKEN:-dev-nats-token}@7d-nats:4222
      HOST: 0.0.0.0
      PORT: 8080
      JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM}
      JWT_KID: ${JWT_KID:-auth-key-1}
      ACCESS_TOKEN_TTL_MINUTES: "15"
      REFRESH_TOKEN_TTL_DAYS: "14"
      ARGON_MEMORY_KB: "65536"
      ARGON_ITERATIONS: "3"
      ARGON_PARALLELISM: "1"
      MAX_CONCURRENT_HASHES: "50"
      HASH_ACQUIRE_TIMEOUT_MS: "5000"
      LOCKOUT_THRESHOLD: "10"
      LOCKOUT_MINUTES: "15"
      LOGIN_PER_MIN_PER_EMAIL: "5"
      REGISTER_PER_MIN_PER_EMAIL: "5"
      REFRESH_PER_MIN_PER_TOKEN: "20"
      TENANT_REGISTRY_URL: http://7d-control-plane:8091
      RUST_LOG: info,auth_rs=debug
    networks:
      - 7d-platform
    labels:
      com.7dsolutions.project: "platform"
      com.7dsolutions.tier: "platform"
      com.7dsolutions.component: "auth"
      com.7dsolutions.type: "api"
      com.7dsolutions.env: "dev"
      com.7dsolutions.instance: "2"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================
  # AUTH LOAD BALANCER
  # =========================
  auth-lb:
    container_name: 7d-auth-lb
    image: nginx:alpine
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    volumes:
      - ./nginx/auth-nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - 7d-platform
    depends_on:
      - auth-1
      - auth-2
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      com.7dsolutions.project: "platform"
      com.7dsolutions.tier: "platform"
      com.7dsolutions.component: "auth-lb"
      com.7dsolutions.type: "proxy"
      com.7dsolutions.env: "dev"

  # =========================
  # API GATEWAY (edge rate limiting)
  # =========================
  gateway:
    container_name: 7d-gateway
    image: nginx:alpine
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.0.1:8000:80"
    networks:
      - 7d-platform
    depends_on:
      - auth-1
      - auth-2
      - control-plane
      - ar
      - gl
      - payments
      - subscriptions
      - notifications
      - inventory
      - ap
      - treasury
      - fixed-assets
      - consolidation
      - timekeeping
      - party
      - integrations
      - ttp
      - pdf-editor
      - maintenance
      - shipping-receiving
      - bom
      - quality-inspection
      - production
      - workflow
      - numbering
      - workforce-competence
      - customer-portal
      - reporting
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/api/gateway/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      com.7dsolutions.project: "platform"
      com.7dsolutions.tier: "platform"
      com.7dsolutions.component: "gateway"
      com.7dsolutions.type: "proxy"
      com.7dsolutions.env: "dev"

  # =========================
  # CONTROL PLANE
