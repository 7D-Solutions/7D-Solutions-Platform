  control-plane:
    container_name: 7d-control-plane
    image: 7d-runtime
    restart: unless-stopped
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:8091:8091"
    environment:
      DATABASE_URL: postgres://${TENANT_REGISTRY_POSTGRES_USER:-tenant_registry_user}:${TENANT_REGISTRY_POSTGRES_PASSWORD:-tenant_registry_pass}@7d-tenant-registry-postgres:5432/${TENANT_REGISTRY_POSTGRES_DB:-tenant_registry_db}?sslmode=require
      AR_DATABASE_URL: postgres://${AR_POSTGRES_USER:-ar_user}:${AR_POSTGRES_PASSWORD:-ar_pass}@7d-ar-postgres:5432/${AR_POSTGRES_DB:-ar_db}?sslmode=require
      PORT: 8091
      HOST: 0.0.0.0
      RUST_LOG: info
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY_PEM}
    networks:
      - 7d-platform
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/api/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      com.7dsolutions.project: "platform"
      com.7dsolutions.tier: "platform"
      com.7dsolutions.component: "control-plane"
      com.7dsolutions.type: "api"
      com.7dsolutions.env: "dev"

