  source: learned
  type: rule
  isNegative: false
  kind: workflow_rule
  state: draft
  maturity: candidate
  createdAt: '2026-03-07T00:43:57.000Z'
  updatedAt: '2026-03-07T00:43:57.000Z'
- id: b-mm53knc8-6vlpj4
  scope: workspace
  category: collaboration
  content: When multiple agents bump the same module version in parallel, check the
