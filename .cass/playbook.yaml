  type: rule
  isNegative: false
  kind: workflow_rule
  state: draft
  maturity: candidate
  createdAt: '2026-03-07T00:43:57.000Z'
  updatedAt: '2026-03-07T00:43:57.000Z'
- id: b-mm5k5l5z-seg6gb
  scope: workspace
  category: architecture
  content: When multiple agents compile Rust concurrently, route all cargo commands
    through a slot system with independent CARGO_TARGET_DIR directories — direct cargo
