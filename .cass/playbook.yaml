  type: rule
  isNegative: false
  kind: workflow_rule
  state: draft
  maturity: candidate
  createdAt: '2026-03-07T00:43:57.000Z'
  updatedAt: '2026-03-07T00:43:57.000Z'
- id: b-mm4t87na-qia3no
  scope: workspace
  category: integration
  content: When adding new API client methods, run a single real sandbox call to capture
    the actual response JSON shape before writing Rust deserialize types — provider
    docs frequently omit optional fields
