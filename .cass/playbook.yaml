  type: rule
  isNegative: false
  kind: workflow_rule
  state: draft
  maturity: candidate
  createdAt: '2026-03-07T00:43:57.000Z'
  updatedAt: '2026-03-07T00:43:57.000Z'
- id: b-mm4y34pz-sedk17
  scope: workspace
  category: collaboration
  content: When multiple agents bump the same module version in parallel, always read
    the current version from Cargo.toml immediately before committing — never cache
    a version number from earlier in the session
  source: learned
  type: rule
  isNegative: false
  kind: workflow_rule
  state: draft
  maturity: candidate
  createdAt: '2026-03-07T00:43:57.000Z'
  updatedAt: '2026-03-07T00:43:57.000Z'
- id: b-mm4y34q3-ypim41
  scope: workspace
  category: integration
  content: When wrapping a third-party API, always compare the actual API response
    JSON against your Rust struct fields before writing tests — missing or renamed
    fields cause silent failures
  source: learned
  type: rule
  isNegative: false
  kind: workflow_rule
  state: draft
  maturity: candidate
  createdAt: '2026-03-07T00:43:57.000Z'
  updatedAt: '2026-03-07T00:43:57.000Z'
- id: b-mm4y34q5-60iapv
  scope: workspace
  category: integration
  content: When adding client methods for a REST API, always deserialize the real
