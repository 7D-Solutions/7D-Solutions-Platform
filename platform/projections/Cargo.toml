[package]
name = "projections"
version = "1.0.0"
edition = "2021"
description = "Event projection framework with cursor tracking, rebuild, and blue-green swap"
publish = ["7d-platform"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["serde", "v4"] }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "chrono", "uuid"] }
tokio = { version = "1", features = ["full"] }
thiserror = "2"
prometheus = "0.13"
sha2 = "0.10"
regex = "1"
futures = "0.3"

[dev-dependencies]

[lints]
workspace = true
