[package]
name = "event-bus"
version = "1.0.1"
edition = "2021"
description = "NATS JetStream event bus with outbox relay, DLQ routing, and consumer retry"
publish = ["7d-platform"]

[dependencies]
async-trait = "0.1"
async-nats = "0.38"
tokio = { version = "1", features = ["sync", "rt", "time"] }
tracing = "0.1"
futures = "0.3"
thiserror = "2.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-stream = "0.3"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["serde", "v4"] }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
tokio-test = "0.4"
criterion = "0.5"
rand = "0.8"

[[bench]]
name = "envelope_bench"
harness = false

[lints]
workspace = true
