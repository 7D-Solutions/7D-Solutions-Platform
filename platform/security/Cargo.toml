[package]
name = "security"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["serde", "v4"] }
thiserror = "2"
tracing = "0.1"
hmac = "0.12"
sha2 = "0.10"
base64 = "0.22"
tokio = { version = "1", features = ["sync", "time"] }
dashmap = "6.1"
prometheus = "0.13"
axum = "0.8"
http = "1"
tower = "0.5"
event-bus = { path = "../event-bus" }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
