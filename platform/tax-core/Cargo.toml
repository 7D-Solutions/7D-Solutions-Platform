[package]
name = "tax-core"
version = "0.1.0"
edition = "2021"
description = "Shared tax models, TaxProvider trait, and error types for 7D platform modules"
publish = ["7d-platform"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }

[lints]
workspace = true
