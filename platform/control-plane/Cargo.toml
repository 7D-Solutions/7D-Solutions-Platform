[package]
name = "control-plane"
version = "1.2.1"
edition = "2021"
description = "Tenant provisioning, platform billing orchestration, and data retention"
publish = ["7d-platform"]

[[bin]]
name = "control-plane"
path = "src/main.rs"

[lib]
name = "control_plane"
path = "src/lib.rs"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["full"] }

sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "macros"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

tower-http = { version = "0.6", features = ["trace"] }
futures = "0.3"
thiserror = "2.0"

tenant-registry = { path = "../../platform/tenant-registry" }
health = { path = "../health" }
event-bus = { path = "../event-bus" }

[dev-dependencies]
axum-test = "18"

[lints]
workspace = true
