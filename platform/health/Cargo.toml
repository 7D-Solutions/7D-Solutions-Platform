[package]
name = "health"
version = "0.1.0"
edition = "2021"
description = "Shared health and readiness check endpoints for all services"
publish = ["7d-platform"]

[dependencies]
axum = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
serde_json = "1"
chrono = "0.4"

[lints]
workspace = true
