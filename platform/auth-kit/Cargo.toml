[package]
name = "auth-kit"
version = "0.1.0"
edition = "2021"
description = "Reusable auth package for vertical apps — login proxy, JWKS verification, claims middleware"

[dependencies]
security = { path = "../security" }

axum = "0.8"
http = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync", "time"] }
tower = "0.5"
tracing = "0.1"
uuid = { version = "1", features = ["serde", "v4"] }
thiserror = "2"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
axum = "0.8"
tower = { version = "0.5", features = ["util"] }
jsonwebtoken = "9"
rsa = "0.9"
rand = "0.8"
chrono = "0.4"
wiremock = "0.6"

[lints]
workspace = true
