[package]
name = "auth-rs"
version = "1.10.1"
edition = "2021"
description = "JWT authentication, session management, password reset, and rate limiting"
publish = ["7d-platform"]

[[bin]]
name = "identity-auth"
path = "src/main.rs"

[[bin]]
name = "openapi_dump"
path = "src/bin/openapi_dump.rs"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["full"] }

sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

dotenvy = "0.15"

jsonwebtoken = "9"
argon2 = "0.5"

rand = "0.8"
sha2 = "0.10"
hex = "0.4"

rsa = "0.9"
base64 = "0.22"

async-nats = "0.38"
event-bus = { path = "../event-bus" }

tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "cors"] }

tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

jsonschema = "0.18"
once_cell = "1.19"

dashmap = "6"
governor = "0.6"
tower_governor = "0.8"
prometheus = "0.13"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
platform-client-tenant-registry = { path = "../../clients/platform-client-tenant-registry" }
platform-sdk = { path = "../platform-sdk" }
health = { path = "../health" }
utoipa = { version = "5", features = ["chrono", "uuid"] }

[dev-dependencies]
futures = "0.3"

[lints]
workspace = true
