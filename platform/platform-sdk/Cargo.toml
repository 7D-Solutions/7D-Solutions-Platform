[package]
name = "platform-sdk"
version = "0.1.0"
edition = "2021"
description = "Module startup SDK — manifest parser, builder, and HTTP runtime for 7D platform services"

[dependencies]
# Platform crates
security = { path = "../security" }
event-bus = { path = "../event-bus" }
health = { path = "../health" }
platform_contracts = { path = "../platform-contracts" }
platform-http-contracts = { path = "../http-contracts", features = ["axum"] }
config-validator = { path = "../config-validator" }

# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "signal", "macros", "net", "sync"] }
futures = "0.3"
async-nats = "0.38"

# Web framework
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors"] }
http = "1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_urlencoded = "0.7"
toml = "0.8"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "json"] }
uuid = { version = "1", features = ["v4"] }

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
prometheus = "0.13"

# HTTP client
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# Utilities
dotenvy = "0.15"
thiserror = "2"
semver = "1"
regex = "1"
chrono = "0.4"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
tempfile = "3"
event-bus = { path = "../event-bus" }
security = { path = "../security" }
futures = "0.3"
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
jsonwebtoken = "9"
rsa = "0.9"
rand = "0.8"
axum = "0.8"
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "json"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
health = { path = "../health" }
platform-client-party = { path = "../../clients/party" }

[lints]
workspace = true
