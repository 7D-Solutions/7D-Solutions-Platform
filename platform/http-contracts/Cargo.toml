[package]
name = "platform-http-contracts"
version = "0.1.0"
edition = "2021"
description = "Shared HTTP response types — pagination, error envelopes, field errors"

[features]
axum = ["dep:axum", "dep:http"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
utoipa = "5"

# Optional — only needed for IntoResponse impl
axum = { version = "0.8", optional = true }
http = { version = "1", optional = true }

[dev-dependencies]
axum = "0.8"
http = "1"
serde_json = "1"
tokio = { version = "1", features = ["macros"] }
tower = { version = "0.5", features = ["util"] }

[lints]
workspace = true
