[package]
name = "client-codegen"
version = "0.1.0"
edition = "2021"
description = "Reads OpenAPI JSON and emits a compilable Rust typed-client crate"

[[bin]]
name = "client-codegen"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[lints]
workspace = true
