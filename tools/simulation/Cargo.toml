[package]
name = "simulation"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "simulation"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1.43", features = ["full"] }

# Database
sqlx = { version = "0.8.2", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono"] }

# Event bus
async-nats = "0.38"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Utilities
uuid = { version = "1.11", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"

# Deterministic RNG (ChaCha20)
rand = "0.8"
rand_chacha = "0.3"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# CLI
clap = { version = "4.5", features = ["derive"] }

# Module access (for oracle)
ar-rs = { path = "../../modules/ar" }
payments-rs = { path = "../../modules/payments" }
subscriptions-rs = { path = "../../modules/subscriptions" }
gl-rs = { path = "../../modules/gl" }

[lints]
workspace = true
