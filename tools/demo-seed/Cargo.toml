[package]
name = "demo-seed"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "demo-seed"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# HTTP client
reqwest = { version = "0.12", features = ["json"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Deterministic RNG (ChaCha8Rng — smallest, fastest Chacha variant)
rand = "0.8"
rand_chacha = "0.3"

# Hashing for dataset digest
sha2 = "0.10"
hex = "0.4"

# Utilities
uuid = { version = "1.0", features = ["v4", "v5", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# CLI
clap = { version = "4.5", features = ["derive", "env"] }
