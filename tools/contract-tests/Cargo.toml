[package]
name = "contract-tests"
version = "1.1.0"
edition = "2021"
description = "Event schema and OpenAPI contract validation tests"

[lib]
path = "src/lib.rs"

[[test]]
name = "event_schema_tests"
path = "tests/event_schema_tests.rs"

[[test]]
name = "openapi_tests"
path = "tests/openapi_tests.rs"

[[test]]
name = "consumer_tests"
path = "tests/consumer_tests.rs"

[[test]]
name = "pdf_editor_consumer_test"
path = "tests/pdf_editor_consumer_test.rs"

[[test]]
name = "golden_fixtures"
path = "tests/golden_fixtures.rs"

[[test]]
name = "coord_round_trip"
path = "tests/coord_round_trip.rs"

[[test]]
name = "visual_drift"
path = "tests/visual_drift.rs"

[dependencies]
jsonschema = "0.18"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
thiserror = "1.0"

[dev-dependencies]
glob = "0.3"
pdf-editor = { path = "../../modules/pdf-editor" }
image = { version = "0.25", default-features = false, features = ["png"] }
pdfium-render = { version = "0.8", features = ["thread_safe"] }

[lints]
workspace = true
