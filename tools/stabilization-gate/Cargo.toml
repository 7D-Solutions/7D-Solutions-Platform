[package]
name = "stabilization-gate"
version = "0.1.0"
edition = "2021"
description = "Stabilization Gate: benchmark harness for production readiness validation"

[[bin]]
name = "stabilization-gate"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1.43", features = ["full"] }

# Database
sqlx = { version = "0.8.2", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono"] }

# Event bus
async-nats = "0.38"
event-bus = { path = "../../platform/event-bus" }
futures = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# CLI
clap = { version = "4.5", features = ["derive"] }

# AR module (real code paths for recon + dunning benchmarks)
ar-rs = { path = "../../modules/ar" }

# Utilities
uuid = { version = "1.11", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
