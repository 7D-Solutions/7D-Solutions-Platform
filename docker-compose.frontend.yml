name: 7d-frontend

# Standalone frontend stack — TCP UI (Tenant Control Plane)
#
# Usage:   docker compose -f docker-compose.frontend.yml up -d
# Depends: data stack + backend services stack must be running
#          (containers reachable via 7d-platform external network)

services:
  # =========================
  # TCP UI (Tenant Control Plane)
  # =========================
  tcp-ui:
    container_name: 7d-tcp-ui
    build:
      context: ./apps/tenant-control-plane-ui
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      IDENTITY_AUTH_BASE_URL: http://7d-auth-lb:80
      TENANT_REGISTRY_BASE_URL: http://7d-control-plane:8091
      TTP_BASE_URL: http://7d-ttp:8100
      AR_BASE_URL: http://7d-ar:8086
      NOTIFICATIONS_BASE_URL: http://7d-notifications:8089
    ports:
      - "3000:3000"
    networks:
      - 7d-platform
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/login || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      com.7dsolutions.project: "platform"
      com.7dsolutions.tier: "frontend"
      com.7dsolutions.component: "tcp-ui"
      com.7dsolutions.type: "frontend"
      com.7dsolutions.env: "dev"

networks:
  7d-platform:
    name: 7d-platform
    external: true
