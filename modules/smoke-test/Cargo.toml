[package]
name = "smoke-test-rs"
version = "0.1.0"
edition = "2021"
description = "Minimal greenfield module — proves plug-and-play SDK works from scratch"

[[bin]]
name = "smoke-test"
path = "src/main.rs"

[[bin]]
name = "openapi_dump"
path = "src/bin/openapi_dump.rs"

[lib]
name = "smoke_test"
path = "src/lib.rs"

[dependencies]
axum = "0.8"
security = { path = "../../platform/security" }
health = { path = "../../platform/health" }
platform-sdk = { path = "../../platform/platform-sdk" }
platform_contracts = { path = "../../platform/platform-contracts" }
event-bus = { path = "../../platform/event-bus" }
platform-http-contracts = { path = "../../platform/http-contracts", features = ["axum"] }
tokio = { version = "1", features = ["full"] }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "chrono", "migrate", "uuid"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }
utoipa = { version = "5", features = ["chrono", "uuid"] }
futures = "0.3"

[lints]
workspace = true
