[module]
name = "vertical-proof"
version = "0.1.0"
description = "Proof vertical — proves a vertical can call 5 platform modules via SDK"

[server]
host = "0.0.0.0"
port = 8200

[database]
migrations = "./db/migrations"
auto_migrate = true
pool_min = 2
pool_max = 12
pool_acquire_timeout_secs = 5
pool_idle_timeout_secs = 300

[bus]
type = "nats"

[events.publish]
outbox_table = "events_outbox"

[events.subscribe]
subjects = ["ar.events.ar.invoice_opened"]
consumer_name = "vertical-proof-ar-listener"

[platform.services]
party         = { enabled = true, criticality = "critical",  default_url = "http://localhost:8098" }
ar            = { enabled = true, criticality = "critical",  default_url = "http://localhost:8086" }
inventory     = { enabled = true, criticality = "critical",  default_url = "http://localhost:8092" }
production    = { enabled = true, criticality = "critical",  default_url = "http://localhost:8108" }
notifications = { enabled = true, criticality = "degraded",  default_url = "http://localhost:8089" }

[sdk]
min_version = "0.1.0"

[rate_limit.tiers.write]
requests_per_window = 100
window_seconds = 60
routes = ["/api/"]
methods = ["POST", "PUT", "PATCH", "DELETE"]

[rate_limit.tiers.read]
requests_per_window = 500
window_seconds = 60
routes = ["/api/"]
methods = ["GET"]

[rate_limit.tiers.auth]
requests_per_window = 10
window_seconds = 60
routes = ["/api/auth", "/api/admin"]
strategy = "ip_only"

[cors]
origins = []
