[module]
name = "customer-portal"
version = "2.1.2"
description = "Customer-facing portal with independent RS256 JWT auth"

[server]
host = "0.0.0.0"
port = 8111

[database]
migrations = "./db/migrations"
auto_migrate = true

[platform.services]
platform-client-doc-mgmt = { enabled = true, default_url = "http://localhost:8095" }

[sdk]
min_version = "0.1.0"
