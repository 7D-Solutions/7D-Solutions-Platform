[module]
name = "customer-complaints"
version = "0.1.0"
description = "Customer complaint lifecycle: intake, triage, investigation, resolution, closure"

[server]
host = "0.0.0.0"
port = 8113

[database]
migrations = "./db/migrations"
auto_migrate = true
pool_min = 2
pool_max = 12
pool_acquire_timeout_secs = 5
pool_idle_timeout_secs = 300

[bus]
type = "nats"
stream_class = "operational"

[events.publish]
outbox_table = "cc_outbox"

[sdk]
min_version = "0.1.0"

[rate_limit.tiers.write]
requests_per_window = 100
window_seconds = 60
routes = ["/api/"]
methods = ["POST", "PUT", "PATCH", "DELETE"]

[rate_limit.tiers.read]
requests_per_window = 500
window_seconds = 60
routes = ["/api/"]
methods = ["GET"]

[rate_limit.tiers.auth]
requests_per_window = 10
window_seconds = 60
routes = ["/api/auth", "/api/admin"]
strategy = "ip_only"

[cors]
origins = []
