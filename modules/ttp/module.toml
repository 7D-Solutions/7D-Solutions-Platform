[module]
name = "ttp"
version = "2.1.12"
description = "Third-party transaction processing: billing runs, metering, service agreements"

[server]
host = "0.0.0.0"
port = 8100

[database]
migrations = "./db/migrations"
auto_migrate = true
pool_min = 2
pool_max = 12
pool_acquire_timeout_secs = 5
pool_idle_timeout_secs = 300

[platform.services]
ar                               = { enabled = true, criticality = "critical", default_url = "http://localhost:8086" }
platform-client-tenant-registry  = { enabled = true, criticality = "critical", default_url = "http://localhost:8092" }

[sdk]
min_version = "0.1.0"

[rate_limit.tiers.write]
requests_per_window = 100
window_seconds = 60
routes = ["/api/"]
methods = ["POST", "PUT", "PATCH", "DELETE"]

[rate_limit.tiers.read]
requests_per_window = 500
window_seconds = 60
routes = ["/api/"]
methods = ["GET"]

[rate_limit.tiers.auth]
requests_per_window = 10
window_seconds = 60
routes = ["/api/auth", "/api/admin"]
strategy = "ip_only"

[cors]
origins = []
