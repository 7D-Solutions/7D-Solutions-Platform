[module]
name = "ttp"
version = "2.1.12"
description = "Third-party transaction processing: billing runs, metering, service agreements"

[server]
host = "0.0.0.0"
port = 8100

[database]
migrations = "./db/migrations"
auto_migrate = true

[platform.services]
ar = { enabled = true, default_url = "http://localhost:8086" }
platform-client-tenant-registry = { enabled = true, default_url = "http://localhost:8092" }

[sdk]
min_version = "0.1.0"
