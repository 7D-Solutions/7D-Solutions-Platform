[module]
name = "shipping-receiving"
version = "2.2.4"
description = "Inbound and outbound shipment tracking with inventory integration"

[server]
host = "0.0.0.0"
port = 8103

[database]
migrations = "./db/migrations"
auto_migrate = true

[bus]
type = "nats"

[events.publish]
outbox_table = "sr_events_outbox"

[platform.services]
inventory = { enabled = true, default_url = "http://localhost:8092" }
quality-inspection = { enabled = true, default_url = "http://7d-quality-inspection:8106" }

[sdk]
min_version = "0.1.0"
