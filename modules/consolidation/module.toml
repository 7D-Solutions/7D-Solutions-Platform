[module]
name = "consolidation"
version = "2.2.4"
description = "Multi-entity financial consolidation with intercompany eliminations"

[server]
host = "0.0.0.0"
port = 8105

[database]
migrations = "./db/migrations"
auto_migrate = true

[platform.services]
gl = { enabled = true, default_url = "http://localhost:8090" }
ar = { enabled = true, default_url = "http://localhost:8086" }
ap = { enabled = true, default_url = "http://localhost:8093" }

[sdk]
min_version = "0.1.0"
