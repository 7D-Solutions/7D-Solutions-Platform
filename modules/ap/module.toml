[module]
name = "ap"
version = "2.1.4"
description = "Accounts payable: bills, purchase orders, payment runs, vendor management, and AP aging"

[server]
host = "0.0.0.0"
port = 8093

[database]
migrations = "./db/migrations"
auto_migrate = true
pool_min = 2
pool_max = 20
pool_acquire_timeout_secs = 5
pool_idle_timeout_secs = 300

[bus]
type = "nats"
stream_class = "financial"

[events.publish]
outbox_table = "events_outbox"

[sdk]
min_version = "0.1.0"

[rate_limit.tiers.write]
requests_per_window = 100
window_seconds = 60
routes = ["/api/"]
methods = ["POST", "PUT", "PATCH", "DELETE"]

[rate_limit.tiers.read]
requests_per_window = 500
window_seconds = 60
routes = ["/api/"]
methods = ["GET"]

[rate_limit.tiers.auth]
requests_per_window = 10
window_seconds = 60
routes = ["/api/auth", "/api/admin"]
strategy = "ip_only"
