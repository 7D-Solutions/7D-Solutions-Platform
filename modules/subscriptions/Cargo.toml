[package]
name = "subscriptions-rs"
version = "2.2.6"
edition = "2021"
description = "Subscription lifecycle management, billing cycles, and usage gating"

[dependencies]
axum = "0.8"
security = { path = "../../platform/security" }
health = { path = "../../platform/health" }
platform-sdk = { path = "../../platform/platform-sdk" }
tokio = { version = "1", features = ["full"] }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "chrono", "uuid", "migrate"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
dotenvy = "0.15"
tower-http = { version = "0.6", features = ["cors"] }
tower = { version = "0.5", features = ["util"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2"
uuid = { version = "1", features = ["v4", "serde"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
event-bus = { path = "../../platform/event-bus" }
projections = { path = "../../platform/projections" }
config-validator = { path = "../../platform/config-validator" }
async-trait = "0.1"
futures = "0.3"
async-nats = "0.38"
prometheus = "0.13"
platform-http-contracts = { path = "../../platform/http-contracts", features = ["axum"] }
utoipa = { version = "5", features = ["chrono", "uuid"] }

[dev-dependencies]
serial_test = "3.3.1"

[lints]
workspace = true
