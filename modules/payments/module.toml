[module]
name = "payments"
version = "2.1.7"
description = "Payment processing: checkout sessions, Tilled webhooks, payment collection"

[server]
host = "0.0.0.0"
port = 8088

[database]
migrations = "./db/migrations"
auto_migrate = true
pool_min = 5
pool_max = 30
pool_acquire_timeout_secs = 5

[bus]
type = "nats"

[events.publish]
outbox_table = "payments_events_outbox"

[sdk]
min_version = "0.1.0"
