[module]
name = "crm-pipeline"
version = "0.1.0"
description = "CRM Pipeline: leads, opportunities, pipeline stages, activities, and sales handoff"

[server]
host = "0.0.0.0"
port = 8112

[database]
migrations = "./db/migrations"
auto_migrate = true
pool_min = 2
pool_max = 20
pool_acquire_timeout_secs = 5
pool_idle_timeout_secs = 300

[bus]
type = "nats"
stream_class = "operational"

[events.publish]
outbox_table = "events_outbox"

[sdk]
min_version = "0.1.0"

[rate_limit.tiers.write]
requests_per_window = 100
window_seconds = 60
routes = ["/api/"]
methods = ["POST", "PUT", "PATCH", "DELETE"]

[rate_limit.tiers.read]
requests_per_window = 500
window_seconds = 60
routes = ["/api/"]
methods = ["GET"]

[cors]
origins = []
