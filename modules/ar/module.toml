[module]
name = "ar"
version = "2.3.0"
description = "Invoicing, collections, payment application, dunning, and cash flow forecasting"

[server]
host = "0.0.0.0"
port = 8086

[database]
migrations = "./db/migrations"
auto_migrate = true
pool_min = 2
pool_max = 25
pool_acquire_timeout_secs = 5
pool_idle_timeout_secs = 300

[bus]
type = "nats"
stream_class = "financial"

[events.publish]
outbox_table = "events_outbox"

[platform.services]
party         = { enabled = true, criticality = "critical", default_url = "http://7d-party:8098" }
notifications = { enabled = true, criticality = "degraded", default_url = "http://7d-notifications:8089" }

[sdk]
min_version = "0.1.0"

[rate_limit.tiers.write]
requests_per_window = 100
window_seconds = 60
routes = ["/api/"]
methods = ["POST", "PUT", "PATCH", "DELETE"]

[rate_limit.tiers.read]
requests_per_window = 500
window_seconds = 60
routes = ["/api/"]
methods = ["GET"]

[rate_limit.tiers.auth]
requests_per_window = 10
window_seconds = 60
routes = ["/api/auth", "/api/admin"]
strategy = "ip_only"
