# ── Composite signals ─────────────────────────────────────────────────────────
  - name: slo_error_budget_composite
    interval: 1m
    rules:
      # Lowest availability budget remaining across all five modules.
      # When this hits 0.10 the release freeze signal fires.
      - record: slo:min_availability_error_budget_remaining:ratio
        expr: |
          min(slo:error_budget_remaining:ratio{slo="availability"})

      # Binary release freeze signal: 1 when any module budget < 10%, else 0.
      # Grafana dashboard: alert panel turns red when this == 1.
      # Release process: do not ship until all modules are back above 10%.
      - record: slo:release_freeze_recommended
        expr: |
          min(slo:error_budget_remaining:ratio{slo="availability"}) < bool 0.10
