# Prometheus recording rules — SLO Error Budget Tracking
#
# These rules pre-compute error budget metrics so the Grafana dashboard
# (ops/grafana/dashboards/slo-budget.json) can query them cheaply.
#
# Error budget math (availability SLO = 99.9%, budget = 0.001):
#   burn_rate     = error_rate / 0.001  (1.0 = sustainable, 36 = fast-burn threshold)
#   budget_remaining = 1 - (error_rate_30d / 0.001)   clamped to [0, 1]
#
# Release freeze threshold: any module with budget_remaining < 0.10 (10%).
#
# Modules: ap (8093), ar (8086), gl, production, inventory
# SLO target: 99.9% availability → error budget = 0.001

# ── Accounts Payable (AP) ─────────────────────────────────────────────────────
groups:
  - name: slo_error_budget_ap
    interval: 1m
    rules:
      # Fraction of the 30-day availability error budget still remaining.
      # Value 1.0 = full budget; 0.0 = exhausted; clamped at 0 (can't go negative).
      - record: slo:error_budget_remaining:ratio
        labels:
          module: ap
          slo: availability
        expr: |
          clamp_min(
            1 - (
              sum(rate(ap_http_requests_total{status=~"5.."}[30d]))
              / sum(rate(ap_http_requests_total[30d]))
            ) / 0.001,
            0
          )

      # Burn rate relative to the sustainable rate (1h window).
      # 1.0 = consuming budget at exactly the SLO pace.
      # 36  = fast-burn threshold (5% budget in 1h).
      - record: slo:burn_rate:1h
        labels:
          module: ap
          slo: availability
        expr: |
          (
            sum(rate(ap_http_requests_total{status=~"5.."}[1h]))
            / sum(rate(ap_http_requests_total[1h]))
          ) / 0.001

      # Burn rate relative to the sustainable rate (6h window).
      # 12 = slow-burn threshold (10% budget in 6h).
      - record: slo:burn_rate:6h
        labels:
          module: ap
          slo: availability
        expr: |
          (
            sum(rate(ap_http_requests_total{status=~"5.."}[6h]))
            / sum(rate(ap_http_requests_total[6h]))
          ) / 0.001

