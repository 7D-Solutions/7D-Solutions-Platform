# Prometheus alert rules — Production Execution
# SLO: 99.9% availability, p95 reads < 500ms, p95 writes < 1000ms, error rate < 0.1%

groups:
  - name: production_slo_availability
    interval: 30s
    rules:

      - alert: Production_AvailabilitySLOFastBurn
        expr: |
          (
            sum(rate(production_http_requests_total{status=~"5.."}[1h]))
            /
            sum(rate(production_http_requests_total[1h]))
          ) > 0.036
        for: 2m
        labels:
          severity: critical
          module: production
          slo: availability
          team: platform
          routing: pagerduty
        annotations:
          summary: "Production availability SLO fast burn (5% budget at risk in 1h)"
          description: |
            Production error rate is burning through the error budget 36× faster than normal.
            Current error rate: {{ $value | humanizePercentage }}
          runbook: "docs/operations/runbook.md#production-availability-slo-fast-burn"
          dashboard: "http://grafana:3000/d/platform-overview?var-module=production"

      - alert: Production_AvailabilitySLOSlowBurn
        expr: |
          (
            sum(rate(production_http_requests_total{status=~"5.."}[6h]))
            /
            sum(rate(production_http_requests_total[6h]))
          ) > 0.012
        for: 15m
        labels:
          severity: warning
          module: production
          slo: availability
          team: platform
          routing: slack
        annotations:
          summary: "Production availability SLO slow burn (10% budget at risk in 6h)"
          description: |
            Production error rate is burning through the error budget 12× faster than normal.
            Current error rate: {{ $value | humanizePercentage }}
          runbook: "docs/operations/runbook.md#production-availability-slo-slow-burn"
          dashboard: "http://grafana:3000/d/platform-overview?var-module=production"

  - name: production_slo_latency
    interval: 30s
    rules:

      - alert: Production_ReadLatencySLOFastBurn
        expr: |
          histogram_quantile(0.95,
            sum(rate(production_http_request_duration_seconds_bucket{method="GET"}[1h])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: critical
          module: production
          slo: latency_reads
          team: platform
          routing: pagerduty
        annotations:
          summary: "Production read p95 latency above 500ms SLO"
          description: "Production read p95 latency is {{ $value | humanizeDuration }} (SLO: 500ms)."
          runbook: "docs/operations/runbook.md#production-latency-slo"
          dashboard: "http://grafana:3000/d/platform-overview?var-module=production"

      - alert: Production_WriteLatencySLOFastBurn
        expr: |
          histogram_quantile(0.95,
            sum(rate(production_http_request_duration_seconds_bucket{method=~"POST|PUT|PATCH|DELETE"}[1h])) by (le)
          ) > 1.0
        for: 5m
        labels:
          severity: critical
          module: production
          slo: latency_writes
          team: platform
          routing: pagerduty
        annotations:
          summary: "Production write p95 latency above 1000ms SLO"
          description: "Production write p95 latency is {{ $value | humanizeDuration }} (SLO: 1000ms)."
          runbook: "docs/operations/runbook.md#production-latency-slo"
          dashboard: "http://grafana:3000/d/platform-overview?var-module=production"

  - name: production_health
    interval: 30s
    rules:
      - alert: Production_HealthCheckFailing
        expr: up{job="production"} == 0
        for: 5m
        labels:
          severity: critical
          module: production
          team: platform
          routing: pagerduty
        annotations:
          summary: "Production health endpoint not responding"
          description: "Production service (7d-production:8108) health check has been failing for 5+ minutes."
          runbook: "docs/operations/runbook.md#module-health-check-failing"
          dashboard: "http://grafana:3000/d/platform-overview?var-module=production"
