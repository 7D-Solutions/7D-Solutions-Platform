name: Hardening Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Gates run after primary CI passes.
# Each job corresponds to a hardening bead (Phase 34).
# Jobs are placeholders — they will be filled in as beads close.

jobs:
  hardening-check:
    name: Hardening Gate Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify hardening docs exist
        run: |
          test -f docs/hardening/README.md || (echo "❌ docs/hardening/README.md missing" && exit 1)
          test -f docs/runbooks/README.md   || (echo "❌ docs/runbooks/README.md missing" && exit 1)
          echo "✓ Hardening scaffold present"

