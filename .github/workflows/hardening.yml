name: Hardening Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Gates run after primary CI passes.
# Each job corresponds to a hardening bead (Phase 34).
# Jobs are placeholders — they will be filled in as beads close.

jobs:
  hardening-check:
    name: Hardening Gate Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify hardening docs exist
        run: |
          test -f docs/hardening/README.md || (echo "❌ docs/hardening/README.md missing" && exit 1)
          test -f docs/runbooks/README.md   || (echo "❌ docs/runbooks/README.md missing" && exit 1)
          echo "✓ Hardening scaffold present"

  # Placeholder: Security sweep (bd-3rti)
  # security-sweep:
  #   name: Security Sweep
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Run security sweep
  #       run: cargo run -p hardening-tools -- security-sweep

  # Placeholder: Dependency audit (bd-3p4l)
  # dependency-audit:
  #   name: Dependency Audit
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Run cargo audit
  #       run: cargo audit

  # Placeholder: Secret scanning (bd-1q38)
  # secret-scan:
  #   name: Secret Scanning
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Scan for secrets
  #       run: ./scripts/secret-scan.sh

  # Placeholder: Go/No-Go report (bd-3g9f)
  # go-no-go:
  #   name: Go/No-Go Decision
  #   runs-on: ubuntu-latest
  #   needs: [security-sweep, dependency-audit, secret-scan]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Generate go/no-go report
  #       run: cargo run -p stabilization-gate -- go-no-go

  # Hardening E2E smoke suite (bd-1wmu)
  # Calls in-process health and version handlers for all 11 library modules.
  # No services required — always passes in CI.
  hardening-e2e-smoke:
    name: Hardening E2E Smoke (all modules)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ar_db
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-hardening-smoke-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-hardening-smoke-

      - name: Run hardening smoke suite (0 FAIL gate)
        env:
          AR_DATABASE_URL: postgres://postgres:postgres@localhost:5432/ar_db
          AUDIT_DATABASE_URL: postgres://postgres:postgres@localhost:5432/ar_db
          PROJECTIONS_DATABASE_URL: postgres://postgres:postgres@localhost:5432/ar_db
          TENANT_REGISTRY_DATABASE_URL: postgres://postgres:postgres@localhost:5432/ar_db
        run: |
          cargo test --test hardening_smoke -p e2e-tests --no-fail-fast -- --nocapture
          echo "✓ Hardening smoke: 0 FAIL"

  # Stabilization gate — reduced (dry-run) mode (bd-32m0)
  # Verifies the binary compiles and can reach Postgres + NATS.
  # No threshold enforcement in dry-run mode; full benchmarks run nightly.
  stabilization-gate-dry:
    name: Stabilization Gate (dry-run)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ar_db
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      nats:
        image: nats:2.10
        ports:
          - 4222:4222
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-stabilization-gate-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stabilization-gate-

      - name: Build stabilization-gate binary
        run: cargo build -p stabilization-gate --release

      - name: Verify baseline report committed
        run: |
          test -f tools/stabilization-gate/reports/baseline.json \
            || (echo "❌ baseline.json missing from reports/" && exit 1)
          echo "✓ baseline.json present"
          python3 -c "
          import json, sys
          d = json.load(open('tools/stabilization-gate/reports/baseline.json'))
          assert d.get('overall_passed') == True, 'baseline.json overall_passed != true'
          print('✓ baseline.json overall_passed=true')
          "

      - name: Run gate in dry-run mode
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ar_db
          NATS_URL: nats://localhost:4222
        run: |
          ./target/release/stabilization-gate run-all --dry-run
          echo "✓ Gate dry-run passed"

  # P46-030 — Production proof gate + rollback rehearsal (dry-run)
  # Proves the full ops loop: proof gate → rollback → smoke → re-deploy → proof gate.
  # Runs against a placeholder host; --dry-run skips all live SSH calls.
  proof-gate-rehearsal:
    name: Proof Gate + Rollback Rehearsal (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Step 1 — Proof gate (dry-run)"
        env:
          PROD_HOST: rehearsal.dry-run.local
          TILLED_WEBHOOK_SECRET: dry-run-placeholder-secret
        run: |
          mkdir -p /tmp/proof_gate_logs
          PROOF_GATE_LOG_DIR=/tmp/proof_gate_logs \
          bash scripts/production/proof_gate.sh --dry-run
          echo "✓ Proof gate (dry-run): all four suites passed"

      - name: "Step 2 — Rollback rehearsal (dry-run): roll back to prior tag + smoke"
        env:
          PROD_HOST: rehearsal.dry-run.local
          IMAGE_REGISTRY: 7dsolutions
        run: |
          bash scripts/production/rollback_stack.sh \
            --dry-run --tag v1.0.0-0000000
          PROD_HOST=rehearsal.dry-run.local \
          bash scripts/production/smoke.sh --dry-run
          echo "✓ Rollback rehearsal (dry-run): rollback + post-rollback smoke passed"

      - name: "Step 3 — Re-deploy to target manifest + re-run proof gate (dry-run)"
        env:
          PROD_HOST: rehearsal.dry-run.local
          TILLED_WEBHOOK_SECRET: dry-run-placeholder-secret
        run: |
          PROOF_GATE_LOG_DIR=/tmp/proof_gate_logs \
          bash scripts/production/proof_gate.sh --dry-run
          echo "✓ Post-restore proof gate (dry-run): system confirmed healthy"

      - name: Upload rehearsal logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-gate-rehearsal-logs-${{ github.run_id }}
          path: /tmp/proof_gate_logs/
          retention-days: 30
          if-no-files-found: warn
