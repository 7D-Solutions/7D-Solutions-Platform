name: Promote Artifacts

# Deploy a specific immutable image tag to the staging VPS.
# Images must already exist in the registry (published by release.yml on tag push).
#
# Rollback = run this workflow again with a prior tag.
# See docs/DEPLOYMENT-STAGING.md for the full runbook.

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      tag:
        description: 'Immutable image tag (required for staging; production reads from deploy/production/MODULE-MANIFEST.md)'
        required: false
        type: string
      skip_smoke:
        description: 'Skip post-deploy smoke checks (staging only)'
        required: false
        default: false
        type: boolean

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: inputs.deploy_target == 'staging'
    environment: staging

    env:
      STAGING_HOST:      ${{ secrets.STAGING_HOST }}
      STAGING_USER:      ${{ secrets.STAGING_USER }}
      STAGING_REPO_PATH: ${{ secrets.STAGING_REPO_PATH }}
      STAGING_SSH_PORT:  ${{ secrets.STAGING_SSH_PORT || '22' }}
      IMAGE_REGISTRY:    ${{ vars.IMAGE_REGISTRY || '7dsolutions' }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate tag (required for staging, no 'latest')
        run: |
          TAG="${{ inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            echo "ERROR: tag input is required for staging deploys." >&2
            exit 1
          fi
          if [[ "$TAG" == "latest" || "$TAG" == *":latest" ]]; then
            echo "ERROR: Cannot deploy 'latest' tag. Specify an immutable tag." >&2
            exit 1
          fi
          echo "Tag validated: ${TAG}"

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/staging_deploy
          chmod 600 ~/.ssh/staging_deploy
          # Add VPS to known hosts to avoid interactive prompt
          ssh-keyscan -p "${{ env.STAGING_SSH_PORT }}" "${{ env.STAGING_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/staging_deploy

      - name: Gate 3 — Validate manifest (pre-deploy)
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
        run: |
          bash scripts/staging/manifest_validate.sh

      - name: Deploy to staging VPS
        env:
          # deploy_stack.sh reads these from the environment
          STAGING_HOST:      ${{ env.STAGING_HOST }}
          STAGING_USER:      ${{ env.STAGING_USER }}
          STAGING_REPO_PATH: ${{ env.STAGING_REPO_PATH }}
          STAGING_SSH_PORT:  ${{ env.STAGING_SSH_PORT }}
          IMAGE_REGISTRY:    ${{ env.IMAGE_REGISTRY }}
        run: |
          EXTRA_FLAGS=""
          if [[ "${{ inputs.skip_smoke }}" == "true" ]]; then
            EXTRA_FLAGS="--skip-smoke"
          fi
          bash scripts/staging/deploy_stack.sh --tag "${{ inputs.tag }}" $EXTRA_FLAGS

      - name: Gate 3 — Diff manifest vs running (post-deploy)
        env:
          STAGING_HOST:     ${{ env.STAGING_HOST }}
          STAGING_USER:     ${{ env.STAGING_USER }}
          STAGING_SSH_PORT: ${{ env.STAGING_SSH_PORT }}
          IMAGE_REGISTRY:   ${{ env.IMAGE_REGISTRY }}
        run: |
          bash scripts/staging/manifest_diff.sh

      - name: Proof gate (smoke + isolation + payment loop)
        if: ${{ inputs.skip_smoke != true }}
        env:
          STAGING_HOST:          ${{ env.STAGING_HOST }}
          SMOKE_STAFF_JWT:       ${{ secrets.SMOKE_STAFF_JWT }}
          TILLED_WEBHOOK_SECRET: ${{ secrets.TILLED_WEBHOOK_SECRET }}
          PROOF_GATE_LOG_DIR:    ${{ runner.temp }}/proof_gate_logs
        run: |
          echo "Waiting 20s for services to stabilise after deploy..."
          sleep 20
          mkdir -p "$PROOF_GATE_LOG_DIR"
          bash scripts/staging/proof_gate.sh

      - name: Upload proof gate logs
        if: ${{ inputs.skip_smoke != true }}
        uses: actions/upload-artifact@v4
        with:
          name: proof-gate-logs-${{ inputs.tag }}
          path: ${{ runner.temp }}/proof_gate_logs/
          retention-days: 90
          if-no-files-found: warn

      - name: Record deployment artifact
        run: |
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > deployment-record.json << EOF
          {
            "tag": "${{ inputs.tag }}",
            "timestamp": "${TIMESTAMP}",
            "triggered_by": "${{ github.actor }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          cat deployment-record.json

      - name: Upload deployment record
        uses: actions/upload-artifact@v4
        with:
          name: deployment-record-${{ inputs.tag }}
          path: deployment-record.json
          retention-days: 365

      - name: Summary
        run: |
          echo "## Staging Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ inputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ inputs.skip_smoke }}" == "true" ]]; then
            echo "**Proof gate:** skipped (skip_smoke=true)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Proof gate:** passed ✓ (smoke + isolation + payment loop)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Proof gate logs stored as artifact: \`proof-gate-logs-${{ inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To roll back, run this workflow again with a prior tag." >> $GITHUB_STEP_SUMMARY
          echo "See docs/DEPLOYMENT-STAGING.md for the rollback runbook." >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Production deploy — manual trigger only, environment protection required.
  # Reads image tags from deploy/production/MODULE-MANIFEST.md; no --tag bypass.
  # External ports are firewalled; smoke checks run via SSH from inside the VPS.
  # Rollback: run workflow again with deploy_target=production after reverting manifest.
  # See docs/DEPLOYMENT-PRODUCTION.md for the full operator runbook.
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: inputs.deploy_target == 'production'
    environment: production

    env:
      PROD_HOST:         ${{ secrets.PROD_HOST }}
      PROD_USER:         ${{ secrets.PROD_USER }}
      PROD_REPO_PATH:    ${{ secrets.PROD_REPO_PATH }}
      PROD_SSH_PORT:     ${{ secrets.PROD_SSH_PORT || '22' }}
      IMAGE_REGISTRY:    ${{ vars.IMAGE_REGISTRY || '7dsolutions' }}
      MANIFEST_FILE:     deploy/production/MODULE-MANIFEST.md

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          # Key is written to a file — not echoed or logged
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/prod_deploy
          chmod 600 ~/.ssh/prod_deploy
          ssh-keyscan -p "${{ env.PROD_SSH_PORT }}" "${{ env.PROD_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/prod_deploy

      - name: Gate 3 — Validate manifest (pre-deploy)
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          MANIFEST_FILE:  ${{ env.MANIFEST_FILE }}
        run: |
          bash scripts/production/manifest_validate.sh

      - name: Deploy to production VPS
        env:
          PROD_HOST:      ${{ env.PROD_HOST }}
          PROD_USER:      ${{ env.PROD_USER }}
          PROD_REPO_PATH: ${{ env.PROD_REPO_PATH }}
          PROD_SSH_PORT:  ${{ env.PROD_SSH_PORT }}
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
        run: |
          bash scripts/production/deploy_stack.sh \
            --manifest "${{ env.MANIFEST_FILE }}"

      - name: Post-deploy secrets check (via SSH)
        env:
          PROD_HOST:     ${{ env.PROD_HOST }}
          PROD_USER:     ${{ env.PROD_USER }}
          PROD_SSH_PORT: ${{ env.PROD_SSH_PORT }}
        run: |
          LOG_DIR="${{ runner.temp }}/prod_deploy_artifacts"
          mkdir -p "$LOG_DIR"
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes \
            -p "$PROD_SSH_PORT" \
            "$PROD_USER@$PROD_HOST" \
            "sudo bash ${PROD_REPO_PATH}/scripts/production/secrets_check.sh" \
            2>&1 | tee "$LOG_DIR/secrets_check.log"

      - name: Gate 3 — Diff manifest vs running (post-deploy)
        env:
          PROD_HOST:      ${{ env.PROD_HOST }}
          PROD_USER:      ${{ env.PROD_USER }}
          PROD_SSH_PORT:  ${{ env.PROD_SSH_PORT }}
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          MANIFEST_FILE:  ${{ env.MANIFEST_FILE }}
        run: |
          bash scripts/production/manifest_diff.sh

      - name: Stabilise — wait for services after deploy
        run: |
          echo "Waiting 20s for production services to stabilise..."
          sleep 20

      - name: Production proof gate (smoke + isolation + payment + rollback rehearsal)
        env:
          PROD_HOST:             ${{ env.PROD_HOST }}
          PROD_USER:             ${{ env.PROD_USER }}
          PROD_SSH_PORT:         ${{ env.PROD_SSH_PORT }}
          PROD_REPO_PATH:        ${{ secrets.PROD_REPO_PATH }}
          SMOKE_STAFF_JWT:       ${{ secrets.SMOKE_STAFF_JWT }}
          TILLED_WEBHOOK_SECRET: ${{ secrets.TILLED_WEBHOOK_SECRET }}
          PROOF_GATE_LOG_DIR:    ${{ runner.temp }}/prod_proof_gate_logs
        run: |
          mkdir -p "$PROOF_GATE_LOG_DIR"
          bash scripts/production/proof_gate.sh

      - name: Upload production proof gate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-proof-gate-logs-${{ github.run_id }}
          path: ${{ runner.temp }}/prod_proof_gate_logs/
          retention-days: 90
          if-no-files-found: warn

      - name: Record deployment artifact
        run: |
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          MANIFEST_HASH="$(git rev-parse HEAD:${{ env.MANIFEST_FILE }} 2>/dev/null || echo 'unknown')"
          cat > deployment-record.json << EOF
          {
            "environment": "production",
            "manifest": "${{ env.MANIFEST_FILE }}",
            "manifest_git_sha": "${MANIFEST_HASH}",
            "repo_sha": "${{ github.sha }}",
            "timestamp": "${TIMESTAMP}",
            "triggered_by": "${{ github.actor }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          cat deployment-record.json

      - name: Upload deployment record
        uses: actions/upload-artifact@v4
        with:
          name: production-deployment-record-${{ github.run_id }}
          path: deployment-record.json
          retention-days: 365

      - name: Upload deploy artifacts (manifest + secrets check log)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy-artifacts-${{ github.run_id }}
          path: |
            ${{ env.MANIFEST_FILE }}
            ${{ runner.temp }}/prod_deploy_artifacts/
          retention-days: 365
          if-no-files-found: warn

      - name: Summary
        run: |
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "## Production Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Manifest:** \`${{ env.MANIFEST_FILE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Repo SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** ${TIMESTAMP}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Gate 3 manifest validation:** passed ✓" >> $GITHUB_STEP_SUMMARY
          echo "**Gate 3 drift diff:** passed ✓ (running images match manifest)" >> $GITHUB_STEP_SUMMARY
          echo "**Secrets check:** passed ✓ (no defaults, mode 0600, root-owned)" >> $GITHUB_STEP_SUMMARY
          echo "**Production proof gate:** passed ✓ (smoke + isolation + payment verify + rollback rehearsal)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Proof gate logs stored as artifact: \`production-proof-gate-logs-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Deploy artifacts (manifest + secrets check log) stored as: \`production-deploy-artifacts-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Rollback" >> $GITHUB_STEP_SUMMARY
          echo "1. Revert \`deploy/production/MODULE-MANIFEST.md\` to the prior pinned tags." >> $GITHUB_STEP_SUMMARY
          echo "2. Re-run this workflow with \`deploy_target=production\`." >> $GITHUB_STEP_SUMMARY
          echo "3. Or use the CLI: \`bash scripts/production/rollback_stack.sh --previous\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [docs/DEPLOYMENT-PRODUCTION.md](docs/DEPLOYMENT-PRODUCTION.md) for the full runbook." >> $GITHUB_STEP_SUMMARY
