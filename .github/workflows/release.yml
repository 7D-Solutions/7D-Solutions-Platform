name: Release Artifacts

on:
  push:
    tags:
      - 'v*'  # Triggered on version tags (e.g., v0.1.0)
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build all workspace binaries
        run: |
          cargo build --release --workspace --bins
          echo "✓ All workspace binaries built"

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Collect binaries and compute checksums
        run: |
          # Auto-discover all workspace binary targets from Cargo metadata
          BINARIES=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | .targets[] | select(.kind[] == "bin") | .name')

          collected=0
          skipped=0
          for binary in $BINARIES; do
            if [ -f "target/release/$binary" ]; then
              echo "Processing $binary..."
              cp "target/release/$binary" "artifacts/$binary"
              cd artifacts
              sha256sum "$binary" > "${binary}.sha256"
              cd ..
              echo "✓ $binary → artifacts/ (with checksum)"
              collected=$((collected + 1))
            else
              echo "⚠ Binary $binary not found in target/release/"
              skipped=$((skipped + 1))
            fi
          done

          echo ""
          echo "=== Collection summary: $collected collected, $skipped skipped ==="
          if [ "$skipped" -gt 0 ]; then
            echo "::warning::$skipped workspace binaries were not found in target/release/"
          fi

      - name: Create release manifest
        run: |
          cat > artifacts/manifest.json << 'EOF'
          {
            "version": "${{ github.ref_name }}",
            "git_sha": "${{ github.sha }}",
            "build_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "artifacts": []
          }
          EOF

          # Add artifact metadata to manifest
          cd artifacts
          for sha_file in *.sha256; do
            if [ -f "$sha_file" ]; then
              binary="${sha_file%.sha256}"
              checksum=$(cat "$sha_file" | awk '{print $1}')

              # Append to manifest (using jq would be better, but keeping it simple)
              echo "  - binary: $binary, checksum: $checksum"
            fi
          done
          cd ..

          echo "✓ Release manifest created"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.sha }}
          path: artifacts/
          retention-days: 90

      - name: Summary
        run: |
          echo "## Release Artifacts Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts:" >> $GITHUB_STEP_SUMMARY
          ls -lh artifacts/ | tail -n +2 >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Build and push immutable Docker images to the registry.
  # Only runs on tag push (not workflow_dispatch).
  # Images are tagged {version}-{git-sha7} — never 'latest'.
  # ---------------------------------------------------------------------------
  build-push-staging-images:
    name: Build & Push Staging Images
    runs-on: ubuntu-latest
    needs: build-artifacts
    # Only push images on real tag pushes — skip on manual workflow_dispatch
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    env:
      IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY || '7dsolutions' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Node (for npm version extraction)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all service images
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
        run: |
          bash scripts/staging/build_images.sh
          echo "✓ All images built"

      - name: Push images to registry (immutable tags only)
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          bash scripts/staging/push_images.sh --confirm
          echo "✓ All images pushed"

      - name: Record pushed image manifest
        run: |
          bash scripts/staging/list_versions.sh --json > staging-image-manifest.json
          cat staging-image-manifest.json

      - name: Upload image manifest
        uses: actions/upload-artifact@v4
        with:
          name: staging-image-manifest-${{ github.ref_name }}
          path: staging-image-manifest.json
          retention-days: 90

      - name: Summary
        run: |
          echo "## Staging Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.IMAGE_REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images pushed:" >> $GITHUB_STEP_SUMMARY
          bash scripts/staging/list_versions.sh >> $GITHUB_STEP_SUMMARY
