name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-contracts:
    name: Validate Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate YAML contracts
        run: |
          python3 -c "
          import yaml
          import sys
          from pathlib import Path
          
          errors = []
          for f in Path('contracts').rglob('*.yaml'):
              try:
                  yaml.safe_load(f.read_text())
                  print(f'✓ {f}')
              except Exception as e:
                  errors.append(f'✗ {f}: {e}')
          
          if errors:
              for e in errors:
                  print(e, file=sys.stderr)
              sys.exit(1)
          "
      
      - name: Validate JSON contracts
        run: |
          python3 -c "
          import json
          import sys
          from pathlib import Path
          
          errors = []
          for f in Path('contracts').rglob('*.json'):
              try:
                  json.loads(f.read_text())
                  print(f'✓ {f}')
              except Exception as e:
                  errors.append(f'✗ {f}: {e}')
          
          if errors:
              for e in errors:
                  print(e, file=sys.stderr)
              sys.exit(1)
          "

  # ---------------------------------------------------------------------------
  # Contract breaking-change gate — required on every PR and push to main.
  # Fails if an OpenAPI spec has removed endpoints or required fields without
  # a corresponding version bump in info.version (the acknowledgment mechanism).
  # See scripts/ci/check-openapi-breaking-changes.sh for detection rules.
  # See docs/architecture/CONTRACT-VERSIONING-POLICY.md for the full policy.
  # ---------------------------------------------------------------------------
  contract-breaking-change-gate:
    name: "Contract Breaking-Change Gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for cross-branch diff

      - name: Check for breaking contract changes
        run: |
          chmod +x scripts/ci/check-openapi-breaking-changes.sh
          scripts/ci/check-openapi-breaking-changes.sh

  validate-module-structure:
    name: Validate Module Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check VERSION and CHANGELOG exist
        run: |
          missing=()

          for module in platform/identity-auth modules/ar modules/subscriptions modules/payments modules/notifications modules/gl; do
            if [ ! -f "$module/VERSION" ]; then
              missing+=("$module/VERSION")
            fi
            if [ ! -f "$module/CHANGELOG.md" ]; then
              missing+=("$module/CHANGELOG.md")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Missing required files:" >&2
            printf '%s\n' "${missing[@]}" >&2
            exit 1
          fi

          echo "✓ All modules have VERSION and CHANGELOG.md"

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-contract-tests-${{ hashFiles('tools/contract-tests/Cargo.lock') }}

      - name: Run contract tests
        working-directory: tools/contract-tests
        run: cargo test --verbose

  cross-module-boundary-guard:
    name: Cross-Module Boundary Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for illegal cross-module source imports
        run: |
          violations=()
          
          # AR must not reference AUTH source paths
          if grep -r "platform/identity-auth/src" modules/ar/src/ 2>/dev/null; then
            violations+=("AR references AUTH source code")
          fi
          
          # AUTH must not reference AR source paths
          if grep -r "modules/ar/src" platform/identity-auth/src/ 2>/dev/null; then
            violations+=("AUTH references AR source code")
          fi
          
          if [ ${#violations[@]} -gt 0 ]; then
            echo "ERROR: Cross-module boundary violations detected:" >&2
            printf '%s\n' "${violations[@]}" >&2
            exit 1
          fi
          
          echo "✓ No cross-module source code dependencies"
      
      - name: Check for illegal cross-module Cargo path dependencies
        run: |
          violations=()

          # ARCHITECTURE RULE: modules → platform is ALLOWED
          #                    modules → modules is PROHIBITED

          # Check all modules for dependencies to OTHER modules (not platform)
          for module in modules/*/Cargo.toml; do
            module_name=$(basename $(dirname "$module"))

            # Check if this module depends on OTHER modules (not platform)
            # Look for: path = "../../modules/OTHER_MODULE" or path = "../OTHER_MODULE"
            if grep -n 'path = .*\.\./\.\.modules/' "$module" 2>/dev/null; then
              violations+=("$module_name has cross-module dependency to another module")
            fi
            if grep -n 'path = .*\.\./[a-z-]*"' "$module" 2>/dev/null | grep -v '\.\./\.\.platform' | grep -v '\.\./src'; then
              violations+=("$module_name may have cross-module dependency")
            fi
          done

          # Check platform modules don't depend on business modules
          for platform_mod in platform/*/Cargo.toml; do
            if [ -f "$platform_mod" ]; then
              plat_name=$(basename $(dirname "$platform_mod"))
              if grep -n 'path = .*modules/' "$platform_mod" 2>/dev/null; then
                violations+=("Platform $plat_name depends on business module (prohibited)")
              fi
            fi
          done

          if [ ${#violations[@]} -gt 0 ]; then
            echo "ERROR: Cross-module Cargo path dependencies detected:" >&2
            printf '%s\n' "${violations[@]}" >&2
            echo "" >&2
            echo "ARCHITECTURE RULES:" >&2
            echo "  ✓ modules → platform  (ALLOWED)" >&2
            echo "  ✗ modules → modules   (PROHIBITED - use contracts)" >&2
            echo "  ✗ platform → modules  (PROHIBITED - platform must be generic)" >&2
            exit 1
          fi

          echo "✓ No prohibited cross-module Cargo path dependencies"

      - name: Check migration boundaries
        run: |
          chmod +x tools/check_migration_boundaries.sh
          ./tools/check_migration_boundaries.sh

  event-metadata-lint:
    name: Event Metadata Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint event metadata presence
        run: |
          chmod +x tools/ci/lint-event-metadata-present.sh
          ./tools/ci/lint-event-metadata-present.sh

  build-auth:
    name: Build AUTH Module
    runs-on: ubuntu-latest
    needs: [contract-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-auth-${{ hashFiles('platform/identity-auth/Cargo.lock') }}
      
      - name: Run cargo check
        working-directory: platform/identity-auth
        run: cargo check --all-targets

  build-ar:
    name: Build AR Module
    runs-on: ubuntu-latest
    needs: [contract-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-ar-${{ hashFiles('modules/ar/Cargo.lock') }}

      - name: Run cargo check
        working-directory: modules/ar
        run: cargo check --all-targets

  build-subscriptions:
    name: Build Subscriptions Module
    runs-on: ubuntu-latest
    needs: [contract-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-subscriptions-${{ hashFiles('modules/subscriptions/Cargo.lock') }}

      - name: Run cargo check
        working-directory: modules/subscriptions
        run: cargo check --all-targets

  build-payments:
    name: Build Payments Module
    runs-on: ubuntu-latest
    needs: [contract-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-payments-${{ hashFiles('modules/payments/Cargo.lock') }}

      - name: Run cargo check
        working-directory: modules/payments
        run: cargo check --all-targets

  build-notifications:
    name: Build Notifications Module
    runs-on: ubuntu-latest
    needs: [contract-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-notifications-${{ hashFiles('modules/notifications/Cargo.lock') }}

      - name: Run cargo check
        working-directory: modules/notifications
        run: cargo check --all-targets

  build-gl:
    name: Build GL Module
    runs-on: ubuntu-latest
    needs: [contract-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-gl-${{ hashFiles('modules/gl/Cargo.lock') }}

      - name: Run cargo check
        working-directory: modules/gl
        run: cargo check --all-targets

  lint-no-panic:
    name: Lint - No Unwrap/Expect in Critical Paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for .unwrap() and .expect() in critical files
        run: |
          violations=()

          # Check consumer files
          if grep -rn '\.unwrap()\|\.expect(' modules/*/src/consumer* 2>/dev/null; then
            violations+=("Found .unwrap() or .expect() in consumer files")
          fi

          # Check events files
          if grep -rn '\.unwrap()\|\.expect(' modules/*/src/events/ 2>/dev/null; then
            violations+=("Found .unwrap() or .expect() in events files")
          fi

          # Check DLQ files
          if grep -rn '\.unwrap()\|\.expect(' modules/*/src/dlq* 2>/dev/null; then
            violations+=("Found .unwrap() or .expect() in DLQ files")
          fi

          if [ ${#violations[@]} -gt 0 ]; then
            echo "ERROR: Panic-prone code detected in critical paths:" >&2
            printf '%s\n' "${violations[@]}" >&2
            echo "" >&2
            echo "Critical paths (consumer, events, dlq) must handle errors gracefully." >&2
            echo "Use Result types and proper error propagation instead of .unwrap()/.expect()." >&2
            exit 1
          fi

          echo "✓ No .unwrap() or .expect() in critical paths"

  lint-no-raw-db-connect:
    name: Lint - Forbid Raw PgPool Creation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for raw PgPool creation outside resolvers
        run: bash tools/ci/lint-no-raw-db-connect.sh

  lint-no-cross-module-imports:
    name: Lint - Forbid Cross-Module Imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for cross-module imports
        run: bash tools/ci/lint-no-cross-module-imports.sh

  lint-file-size:
    name: Lint - Max File Size (500 LOC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check source file sizes
        run: bash scripts/lint-file-size.sh

  lint-revisions:
    name: Lint - REVISIONS.md Completeness (proven modules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate REVISIONS.md entries for all proven modules (>= 1.0.0)
        run: bash scripts/versioning/lint_revisions.sh

  lint-no-ignored-tests:
    name: Lint - Forbid Unapproved #[ignore] in E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for unapproved ignored E2E tests
        run: bash tools/ci/lint-no-ignored-tests.sh

  check-dlq-migrations:
    name: Check DLQ Migrations Exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify all modules have DLQ migrations
        run: |
          missing=()

          for module in modules/ar modules/subscriptions modules/payments modules/notifications modules/gl; do
            if ! find "$module/db/migrations" -name "*failed_events*" 2>/dev/null | grep -q .; then
              missing+=("$module is missing DLQ (failed_events) migration")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Missing DLQ migrations:" >&2
            printf '%s\n' "${missing[@]}" >&2
            echo "" >&2
            echo "All modules must have a DLQ migration (failed_events table)." >&2
            echo "See docs/architecture/DEPLOYMENT-RUNBOOK.md for DLQ schema." >&2
            exit 1
          fi

          echo "✓ All modules have DLQ migrations"

  e2e-happy-path:
    name: E2E Test - Happy Path
    runs-on: ubuntu-latest
    needs: [build-ar, build-subscriptions, build-payments, build-notifications, build-gl]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create external Docker resources
        run: |
          docker network create 7d-platform || true
          docker volume create 7d-nats-data || true
          docker volume create 7d-ar-pgdata || true
          docker volume create 7d-subscriptions-pgdata || true
          docker volume create 7d-payments-pgdata || true
          docker volume create 7d-notifications-pgdata || true

      - name: Start infrastructure
        run: |
          docker compose -f docker-compose.infrastructure.yml up -d
          sleep 10

      - name: Build and start modules
        run: |
          docker compose -f docker-compose.modules.yml build
          docker compose -f docker-compose.modules.yml up -d
          sleep 30

      - name: Wait for services to be healthy
        run: |
          timeout 120 bash -c '
            until docker compose -f docker-compose.modules.yml ps | grep -q "(healthy)"; do
              echo "Waiting for services to be healthy..."
              sleep 5
            done
          '

      - name: Run happy path E2E test
        working-directory: e2e-tests
        run: cargo test --test real_e2e -- --test-threads=1 --nocapture
        env:
          RUST_LOG: info

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== AR Logs ==="
          docker logs 7d-ar || true
          echo "=== Payments Logs ==="
          docker logs 7d-payments || true
          echo "=== Subscriptions Logs ==="
          docker logs 7d-subscriptions || true
          echo "=== Notifications Logs ==="
          docker logs 7d-notifications || true
          echo "=== GL Logs ==="
          docker logs gl-rs || true

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.modules.yml down || true
          docker compose -f docker-compose.infrastructure.yml down || true

  e2e-phase10-governance:
    name: E2E Test - Phase 10 Governance
    runs-on: ubuntu-latest
    needs: [build-gl]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create external Docker resources
        run: |
          docker network create 7d-platform || true
          docker volume create 7d-nats-data || true
          docker volume create 7d-gl-pgdata || true

      - name: Start infrastructure
        run: |
          docker compose -f docker-compose.infrastructure.yml up -d
          sleep 10

      - name: Build and start GL module
        run: |
          docker compose -f docker-compose.modules.yml build gl-rs
          docker compose -f docker-compose.modules.yml up -d gl-rs gl-postgres nats
          sleep 15

      - name: Wait for GL service to be healthy
        run: |
          timeout 60 bash -c '
            until curl -f http://localhost:8090/api/health 2>/dev/null; do
              echo "Waiting for GL service to be healthy..."
              sleep 2
            done
          '
          echo "✓ GL service is healthy"

      - name: Run Phase 10 governance E2E tests
        working-directory: e2e-tests
        run: cargo test --test phase10_governance_e2e -- --ignored --test-threads=1 --nocapture
        env:
          RUST_LOG: info

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== GL Logs ==="
          docker logs gl-rs || true
          echo "=== GL Postgres Logs ==="
          docker logs gl-postgres || true
          echo "=== NATS Logs ==="
          docker logs nats || true

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.modules.yml down || true
          docker compose -f docker-compose.infrastructure.yml down || true

  e2e-phase11-balances:
    name: E2E Test - Phase 11 Balances
    runs-on: ubuntu-latest
    needs: [build-gl]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create external Docker resources
        run: |
          docker network create 7d-platform || true
          docker volume create 7d-nats-data || true
          docker volume create 7d-gl-pgdata || true

      - name: Start infrastructure
        run: |
          docker compose -f docker-compose.infrastructure.yml up -d
          sleep 10

      - name: Build and start GL module
        run: |
          docker compose -f docker-compose.modules.yml build gl-rs
          docker compose -f docker-compose.modules.yml up -d gl-rs gl-postgres nats
          sleep 15

      - name: Wait for GL service to be healthy
        run: |
          timeout 60 bash -c '
            until curl -f http://localhost:8090/api/health 2>/dev/null; do
              echo "Waiting for GL service to be healthy..."
              sleep 2
            done
          '
          echo "✓ GL service is healthy"

      - name: Run Phase 11 balance E2E tests
        working-directory: e2e-tests
        run: |
          cargo test --test balance_posting_e2e -- --ignored --test-threads=1 --nocapture
          cargo test --test balance_reversal_e2e -- --ignored --test-threads=1 --nocapture
          cargo test --test trial_balance_api_e2e -- --ignored --test-threads=1 --nocapture
        env:
          RUST_LOG: info

      - name: Run Phase 11 boundary E2E test (NATS write path)
        working-directory: modules/gl
        run: |
          cargo test --test boundary_e2e_nats_posting -- --test-threads=1 --nocapture
        env:
          RUST_LOG: info
          DATABASE_URL: postgres://gl_user:gl_pass@localhost:5438/gl_db
          NATS_URL: nats://localhost:4222

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== GL Logs ==="
          docker logs gl-rs || true
          echo "=== GL Postgres Logs ==="
          docker logs gl-postgres || true
          echo "=== NATS Logs ==="
          docker logs nats || true

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.modules.yml down || true
          docker compose -f docker-compose.infrastructure.yml down || true

  gl-unit-tests:
    name: GL Unit Tests
    runs-on: ubuntu-latest
    needs: [build-gl]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-gl-unit-${{ hashFiles('modules/gl/Cargo.lock') }}

      - name: Run GL unit tests
        working-directory: modules/gl
        run: cargo test --lib --bins
        env:
          RUST_LOG: info

  gl-statement-contract-tests:
    name: GL Statement Contract Snapshot Tests (Phase 14.9)
    runs-on: ubuntu-latest
    needs: [build-gl]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-gl-contract-${{ hashFiles('modules/gl/Cargo.lock') }}

      - name: Run statement contract snapshot tests
        working-directory: modules/gl
        run: cargo test --test statement_contract_snapshot_test
        env:
          RUST_LOG: info

      - name: Fail if contract tests fail
        if: failure()
        run: |
          echo "❌ Statement contract snapshot tests FAILED!"
          echo ""
          echo "This indicates a BREAKING CHANGE to financial statement API contracts."
          echo ""
          echo "If this change is intentional:"
          echo "  1. Bump version in modules/gl/VERSION (following SemVer)"
          echo "  2. Update test snapshots in tests/statement_contract_snapshot_test.rs"
          echo "  3. Document breaking changes in modules/gl/CHANGELOG.md"
          echo ""
          echo "See CONTRACT-VERSIONING-POLICY.md for version bump guidelines."
          exit 1

  e2e-phase12-reporting:
    name: E2E Test - Phase 12 Reporting
    runs-on: ubuntu-latest
    needs: [build-gl]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create external Docker resources
        run: |
          docker network create 7d-platform || true
          docker volume create 7d-nats-data || true
          docker volume create 7d-gl-pgdata || true

      - name: Start infrastructure
        run: |
          docker compose -f docker-compose.infrastructure.yml up -d
          sleep 10

      - name: Build and start GL module
        run: |
          docker compose -f docker-compose.modules.yml build gl-rs
          docker compose -f docker-compose.modules.yml up -d gl-rs gl-postgres nats
          sleep 15

      - name: Wait for GL service to be healthy
        run: |
          timeout 60 bash -c '
            until curl -f http://localhost:8090/api/health 2>/dev/null; do
              echo "Waiting for GL service to be healthy..."
              sleep 2
            done
          '
          echo "✓ GL service is healthy"

      - name: Run Phase 12 reporting HTTP boundary E2E tests
        working-directory: modules/gl
        run: |
          cargo test --test boundary_e2e_http_account_activity -- --test-threads=1 --nocapture
          cargo test --test boundary_e2e_http_gl_detail -- --test-threads=1 --nocapture
          cargo test --test boundary_e2e_http_period_summary -- --test-threads=1 --nocapture
          cargo test --test boundary_e2e_http_trial_balance -- --test-threads=1 --nocapture
        env:
          RUST_LOG: info
          DATABASE_URL: postgres://gl_user:gl_pass@localhost:5438/gl_db

      # TODO: Enable once bd-3gr (HTTP Handlers) is merged
      # Phase 13: Period Close Workflow HTTP Boundary E2E Tests
      # - name: Run Phase 13 period close HTTP boundary E2E tests
      #   working-directory: modules/gl
      #   run: |
      #     cargo test --test boundary_e2e_http_period_close -- --test-threads=1 --nocapture
      #   env:
      #     RUST_LOG: info
      #     DATABASE_URL: postgres://gl_user:gl_pass@localhost:5438/gl_db
      #     DB_MAX_CONNECTIONS: 2
      #     DB_MIN_CONNECTIONS: 0

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== GL Logs ==="
          docker logs gl-rs || true
          echo "=== GL Postgres Logs ==="
          docker logs gl-postgres || true
          echo "=== NATS Logs ==="
          docker logs nats || true

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.modules.yml down || true
          docker compose -f docker-compose.infrastructure.yml down || true

  e2e-platform-spine:
    name: E2E Test - Platform Spine (Projections, Audit, Tenant Registry)
    runs-on: ubuntu-latest
    services:
      projections-postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: projections_db
          POSTGRES_USER: projections_user
          POSTGRES_PASSWORD: projections_pass
        ports:
          - 5439:5432
        options: >-
          --health-cmd "pg_isready -U projections_user -d projections_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      audit-postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: audit_db
          POSTGRES_USER: audit_user
          POSTGRES_PASSWORD: audit_pass
        ports:
          - 5440:5432
        options: >-
          --health-cmd "pg_isready -U audit_user -d audit_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      tenant-registry-postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tenant_registry_db
          POSTGRES_USER: tenant_registry_user
          POSTGRES_PASSWORD: tenant_registry_pass
        ports:
          - 5441:5432
        options: >-
          --health-cmd "pg_isready -U tenant_registry_user -d tenant_registry_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-platform-spine-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-platform-spine-
            ${{ runner.os }}-cargo-

      - name: Run projection cursor contract E2E tests
        working-directory: e2e-tests
        run: cargo test --test projection_cursor_contract_e2e -- --test-threads=1 --nocapture
        env:
          RUST_LOG: info
          PROJECTIONS_DATABASE_URL: postgresql://projections_user:projections_pass@localhost:5439/projections_db

      - name: Run tenant registry smoke E2E tests
        working-directory: e2e-tests
        run: cargo test --test tenant_registry_smoke_e2e -- --test-threads=1 --nocapture
        env:
          RUST_LOG: info
          TENANT_REGISTRY_DATABASE_URL: postgresql://tenant_registry_user:tenant_registry_pass@localhost:5441/tenant_registry_db

      - name: Run audit append-only E2E tests
        working-directory: e2e-tests
        run: cargo test --test audit_append_only_e2e -- --test-threads=1 --nocapture
        env:
          RUST_LOG: info
          AUDIT_DATABASE_URL: postgresql://audit_user:audit_pass@localhost:5440/audit_db

  # ---------------------------------------------------------------------------
  # Gate 2: CI builds and publishes immutable images on version-intent merges.
  # Only runs on push to main when a version-intent change is detected.
  # Tag format: {version}-{git-sha7}  (never 'latest', never overwritten)
  # See docs/VERSIONING.md § Gate 2 for the full spec.
  # ---------------------------------------------------------------------------
  gate2-detect-intent:
    name: "Gate 2: Detect Version Intent"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      has_intent: ${{ steps.detect.outputs.has_intent }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version intent
        id: detect
        run: |
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
          # Guard: first push or force-push sends all-zero base SHA
          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            BASE="HEAD~1"
          fi
          if bash scripts/versioning/detect_version_intent.sh "$BASE" "$HEAD"; then
            echo "has_intent=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_intent=false" >> "$GITHUB_OUTPUT"
            echo "No version intent detected — Gate 2 image build skipped."
          fi

  gate2-image-build:
    name: "Gate 2: Build & Push Immutable Images"
    runs-on: ubuntu-latest
    needs: gate2-detect-intent
    if: needs.gate2-detect-intent.outputs.has_intent == 'true'
    env:
      IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY || '7dsolutions' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Node.js (for npm version extraction)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all service images
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
        run: |
          bash scripts/staging/build_images.sh
          echo "✓ All images built with immutable tags"

      - name: Push images to registry (immutable tags, no overwrite)
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          bash scripts/staging/push_images.sh --confirm
          echo "✓ All images pushed"

      - name: Record image manifest
        run: |
          bash scripts/staging/list_versions.sh --json > gate2-image-manifest.json
          cat gate2-image-manifest.json

      - name: Upload image manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: gate2-image-manifest-${{ github.sha }}
          path: gate2-image-manifest.json
          retention-days: 90

      - name: Summary
        run: |
          echo "## Gate 2: Immutable Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.IMAGE_REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag format:** \`{version}-{git-sha7}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images pushed:" >> $GITHUB_STEP_SUMMARY
          bash scripts/staging/list_versions.sh >> $GITHUB_STEP_SUMMARY
