name: 7d-solutions-platform

# Three-stack model: data / backend / frontend
#
# Data:     docker compose -f docker-compose.data.yml up -d
# Backend:  docker compose up -d
# Frontend: docker compose -f docker-compose.frontend.yml up -d
#
# All three share the 7d-platform external network.
# Start data first, then backend, then frontend.
#
# Legacy files (docker-compose.infrastructure.yml, docker-compose.platform.yml,
# docker-compose.modules.yml) are kept for backward compatibility but are
# superseded by the data/services/frontend split.

include:
  - docker-compose.services.yml
  - docker-compose.cross.yml
