# docker-compose.production-data.yml — Production secrets overlay for data stack.
#
# Usage:
#   docker compose -f docker-compose.data.yml -f docker-compose.production-data.yml up -d
#
# Overrides NATS and Postgres containers to read secrets from files instead
# of plaintext environment variables. See docs/SECRETS.md.

secrets:
  nats_auth_token:
    file: /etc/7d/production/secrets/nats_auth_token

  auth_postgres_password:
    file: /etc/7d/production/secrets/auth_postgres_password
  ar_postgres_password:
    file: /etc/7d/production/secrets/ar_postgres_password
  subscriptions_postgres_password:
    file: /etc/7d/production/secrets/subscriptions_postgres_password
  payments_postgres_password:
    file: /etc/7d/production/secrets/payments_postgres_password
  notifications_postgres_password:
    file: /etc/7d/production/secrets/notifications_postgres_password
  gl_postgres_password:
    file: /etc/7d/production/secrets/gl_postgres_password
  projections_postgres_password:
    file: /etc/7d/production/secrets/projections_postgres_password
  audit_postgres_password:
    file: /etc/7d/production/secrets/audit_postgres_password
  tenant_registry_postgres_password:
    file: /etc/7d/production/secrets/tenant_registry_postgres_password
  inventory_postgres_password:
    file: /etc/7d/production/secrets/inventory_postgres_password
  ap_postgres_password:
    file: /etc/7d/production/secrets/ap_postgres_password
  treasury_postgres_password:
    file: /etc/7d/production/secrets/treasury_postgres_password
  fixed_assets_postgres_password:
    file: /etc/7d/production/secrets/fixed_assets_postgres_password
  consolidation_postgres_password:
    file: /etc/7d/production/secrets/consolidation_postgres_password
  timekeeping_postgres_password:
    file: /etc/7d/production/secrets/timekeeping_postgres_password
  party_postgres_password:
    file: /etc/7d/production/secrets/party_postgres_password
  integrations_postgres_password:
    file: /etc/7d/production/secrets/integrations_postgres_password
  ttp_postgres_password:
    file: /etc/7d/production/secrets/ttp_postgres_password
  pdf_editor_postgres_password:
    file: /etc/7d/production/secrets/pdf_editor_postgres_password
  maintenance_postgres_password:
    file: /etc/7d/production/secrets/maintenance_postgres_password
  shipping_receiving_postgres_password:
    file: /etc/7d/production/secrets/shipping_receiving_postgres_password
  numbering_postgres_password:
    file: /etc/7d/production/secrets/numbering_postgres_password
  doc_mgmt_postgres_password:
    file: /etc/7d/production/secrets/doc_mgmt_postgres_password
  workflow_postgres_password:
    file: /etc/7d/production/secrets/workflow_postgres_password
  wc_postgres_password:
    file: /etc/7d/production/secrets/wc_postgres_password

services:
  # NATS — entrypoint wrapper reads token into env for nats.conf
  nats:
    entrypoint: ["/usr/local/bin/secrets-entrypoint.sh"]
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ./scripts/docker-secrets-entrypoint.sh:/usr/local/bin/secrets-entrypoint.sh:ro
    secrets:
      - source: nats_auth_token
        target: NATS_AUTH_TOKEN

  # Postgres containers — use native POSTGRES_PASSWORD_FILE
  auth-postgres:
    secrets:
      - source: auth_postgres_password
        target: pg_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      POSTGRES_PASSWORD: ""

  ar-postgres:
    secrets:
      - source: ar_postgres_password
        target: pg_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      POSTGRES_PASSWORD: ""

  subscriptions-postgres:
