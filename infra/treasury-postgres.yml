# Treasury PostgreSQL service
# Start with: docker compose -f infra/treasury-postgres.yml up -d
# Registers on port 5444, joins the 7d-platform network
name: 7d-treasury-infra

services:
  treasury-postgres:
    container_name: 7d-treasury-postgres
    image: postgres:16-alpine
    ports:
      - "5444:5432"
    environment:
      POSTGRES_DB: treasury_db
      POSTGRES_USER: treasury_user
      POSTGRES_PASSWORD: treasury_pass
    volumes:
      - treasury_pgdata:/var/lib/postgresql/data
    networks:
      - 7d-platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treasury_user -d treasury_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      com.7dsolutions.project: "platform"
      com.7dsolutions.tier: "infrastructure"
      com.7dsolutions.component: "treasury-db"
      com.7dsolutions.type: "database"
      com.7dsolutions.env: "dev"

networks:
  7d-platform:
    name: 7d-platform
    external: true

volumes:
  treasury_pgdata:
    name: 7d-treasury-pgdata
    external: true
