# Prometheus Alert Rules: Invariant Failures
#
# Phase 16: Operational Readiness - Data Integrity Sentinel
# Phase 46: Runbook links updated (bd-1v9b)
# Phase 48: Thresholds confirmed against Phase 45 proof-gate evidence (bd-4nh7)
#
# Evidence basis (Phase 45 proof gate):
#   - Zero invariant violations observed during smoke, isolation, and payment suites
#   - GL balance maintained at 0 imbalance throughout all test cycles
#   - Warning threshold (> 0) appropriate: any violation warrants investigation
#   - Critical GL threshold (> 5) appropriate: sustained violations require rollback
#
# Runbook: docs/runbooks/incident_response.md#invariant-violations
#   See also: docs/ops/ALERT-THRESHOLDS.md#3-invariant-violations

groups:
  - name: invariant_failures
    interval: 30s
    rules:
      # Critical: GL invariant violations (highest severity - financial integrity)
      - alert: GLInvariantViolationCritical
        expr: increase(gl_invariant_violations_total[5m]) > 5
        for: 1m
        labels:
          severity: critical
          module: gl
          category: data_integrity
        annotations:
          summary: "Critical GL invariant violations detected"
          description: >
            {{ $value }} GL invariant violations detected in last 5 minutes.
            Financial integrity at risk. Immediate rollback may be required.
            Type: {{ $labels.violation_type }}, Tenant: {{ $labels.tenant_id }}
          runbook_url: "docs/runbooks/incident_response.md#invariant-violations"
          dashboard_url: "https://grafana.7dsolutions.com/d/gl/invariant-dashboard"

      - alert: GLInvariantViolationWarning
        expr: increase(gl_invariant_violations_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          module: gl
          category: data_integrity
        annotations:
          summary: "GL invariant violation detected"
          description: >
            GL invariant violation: {{ $labels.violation_type }}.
            Investigate immediately. Freeze related deployments.
            Tenant: {{ $labels.tenant_id }}
          runbook_url: "docs/runbooks/incident_response.md#invariant-violations"

      # Critical: AR invariant violations
      - alert: ARInvariantViolationCritical
        expr: increase(ar_invariant_violations_total[5m]) > 10
        for: 2m
        labels:
          severity: critical
          module: ar
          category: data_integrity
        annotations:
          summary: "Critical AR invariant violations detected"
          description: >
            {{ $value }} AR invariant violations in last 5 minutes.
            Billing state corruption detected. Rollback may be required.
            Type: {{ $labels.violation_type }}
          runbook_url: "docs/runbooks/incident_response.md#invariant-violations"
          dashboard_url: "https://grafana.7dsolutions.com/d/ar/invariant-dashboard"

      - alert: ARInvariantViolationWarning
        expr: increase(ar_invariant_violations_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          module: ar
          category: data_integrity
        annotations:
          summary: "AR invariant violation detected"
          description: >
            AR invariant violation: {{ $labels.violation_type }}.
            Investigate immediately. May impact billing accuracy.
          runbook_url: "docs/runbooks/incident_response.md#invariant-violations"

      # Critical: Payments invariant violations
      - alert: PaymentsInvariantViolationCritical
        expr: increase(payments_invariant_violations_total[5m]) > 10
        for: 2m
        labels:
          severity: critical
          module: payments
          category: data_integrity
        annotations:
          summary: "Critical Payments invariant violations detected"
          description: >
            {{ $value }} Payments invariant violations in last 5 minutes.
            Payment state drift can cause double-charging or revenue loss.
            Type: {{ $labels.violation_type }}
          runbook_url: "docs/runbooks/incident_response.md#invariant-violations"
          dashboard_url: "https://grafana.7dsolutions.com/d/payments/invariant-dashboard"

      - alert: PaymentsInvariantViolationWarning
        expr: increase(payments_invariant_violations_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          module: payments
          category: data_integrity
        annotations:
          summary: "Payments invariant violation detected"
          description: >
            Payments invariant violation: {{ $labels.violation_type }}.
            Investigate immediately. Payment integrity at risk.
          runbook_url: "docs/runbooks/incident_response.md#invariant-violations"

      # Critical: Subscriptions invariant violations
      - alert: SubscriptionsInvariantViolationCritical
        expr: increase(subscriptions_invariant_violations_total[5m]) > 10
        for: 2m
        labels:
          severity: critical
          module: subscriptions
          category: data_integrity
        annotations:
          summary: "Critical Subscriptions invariant violations detected"
          description: >
            {{ $value }} Subscriptions invariant violations in last 5 minutes.
            Billing cycle state corruption impacts revenue accuracy.
            Type: {{ $labels.violation_type }}
          runbook_url: "docs/runbooks/incident_response.md#invariant-violations"
          dashboard_url: "https://grafana.7dsolutions.com/d/subscriptions/invariant-dashboard"

      - alert: SubscriptionsInvariantViolationWarning
        expr: increase(subscriptions_invariant_violations_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          module: subscriptions
          category: data_integrity
        annotations:
          summary: "Subscriptions invariant violation detected"
          description: >
            Subscriptions invariant violation: {{ $labels.violation_type }}.
            Investigate immediately. Billing cycle integrity at risk.
          runbook_url: "docs/runbooks/incident_response.md#invariant-violations"

      # Specific invariant type alerts (Phase 15 invariants)
      - alert: UnknownOutsideRetryWindowCritical
        expr: increase(ar_invariant_violations_total{violation_type="no_unknown_outside_retry_window"}[5m]) > 0
        for: 2m
        labels:
          severity: critical
          module: ar
          category: billing_integrity
        annotations:
          summary: "Invoices stuck in UNKNOWN beyond retry window"
          description: >
            {{ $value }} invoices in UNKNOWN state beyond 6-hour retry window.
            Manual intervention required. Billing cycle blocked.
          runbook_url: "docs/runbooks/incident_response.md#unknown-protocol-resolution"

      - alert: DuplicateInvoicesPerCycleCritical
        expr: increase(subscriptions_invariant_violations_total{violation_type="no_duplicate_invoices_per_cycle"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
          module: subscriptions
          category: billing_integrity
        annotations:
          summary: "Duplicate invoices detected for billing cycle"
          description: >
            {{ $value }} billing cycles with duplicate invoices.
            Double-billing detected! Immediate investigation required.
          runbook_url: "docs/runbooks/incident_response.md#invariant-violations"

      - alert: RetroactiveStateChangesCritical
        expr: increase(ar_invariant_violations_total{violation_type="no_retroactive_state_changes"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
          module: ar
          category: lifecycle_integrity
        annotations:
          summary: "Retroactive invoice state changes detected"
          description: >
            {{ $value }} invoices with retroactive state mutations outside valid windows.
            Lifecycle integrity violated. Investigate immediately.
          runbook_url: "docs/runbooks/incident_response.md#invariant-violations"

      - alert: OrphanedFinalizationAttemptsCritical
        expr: increase(ar_invariant_violations_total{violation_type="no_orphaned_finalization_attempts"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
          module: ar
          category: referential_integrity
        annotations:
          summary: "Orphaned finalization attempts detected"
          description: >
            {{ $value }} finalization attempts without parent invoice records.
            Referential integrity violated. Database corruption suspected.
          runbook_url: "docs/runbooks/incident_response.md#invariant-violations"
