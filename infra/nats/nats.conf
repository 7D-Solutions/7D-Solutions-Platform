# 7D Solutions Platform — NATS Server Configuration
#
# User/password authentication for all client connections.
# The password comes from the NATS_AUTH_TOKEN environment variable,
# which must be set in the container's environment (via docker-compose).
#
# async-nats (Rust) parses nats://user:pass@host URLs as user/password,
# so we use this form rather than token-based auth.

authorization {
  user: platform
  password: $NATS_AUTH_TOKEN
}

# JetStream — persistent messaging for event bus
jetstream {
  store_dir: /data
}

# Monitoring endpoint — listen on all interfaces inside the container;
# the host port is bound to 127.0.0.1 in docker-compose.data.yml.
http_port: 8222
