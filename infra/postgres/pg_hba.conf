# pg_hba.conf — Shared HBA rules for all 7D Postgres containers.
#
# Key policy: remote (non-Unix-socket) connections MUST use TLS.
#   - "local" (Unix socket) connections are allowed without TLS for health checks
#     and maintenance inside the container.
#   - "hostssl" requires a TLS-encrypted connection for all TCP access.
#   - "hostnossl" lines are absent, so plaintext TCP is denied.

# TYPE    DATABASE    USER    ADDRESS         METHOD
local     all         all                     trust
hostssl   all         all     0.0.0.0/0       md5
hostssl   all         all     ::/0            md5
