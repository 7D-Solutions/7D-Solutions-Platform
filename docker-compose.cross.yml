# Cross-compilation overlay — mounts host-compiled Linux binaries into containers.
# Use with: docker compose -f docker-compose.services.yml -f docker-compose.cross.yml up -d
#
# Binaries are cross-compiled on macOS targeting aarch64-unknown-linux-musl:
#   target/aarch64-unknown-linux-musl/debug/<binary-name>
#
# Services use 7d-runtime as base image (debian + supervisor + binary watcher).
# Build it once: docker build -t 7d-runtime -f infra/Dockerfile.runtime .
#
# Each service sets SERVICE_BINARY so the entrypoint + watcher know which binary
# to run and watch. No docker restart needed — the watcher detects binary changes
# via checksum and restarts the process via supervisorctl.
#
# Script: scripts/dev-cross.sh <service>

services:
  ar:
    image: 7d-runtime
    working_dir: /app
    environment:
      SERVICE_BINARY: /usr/local/bin/ar-rs
    volumes:
      - ./target/aarch64-unknown-linux-musl/debug/ar-rs:/usr/local/bin/ar-rs:ro
      - ./modules/ar/module.toml:/app/module.toml:ro
      - ./modules/ar/db/migrations:/app/db/migrations:ro

  subscriptions:
