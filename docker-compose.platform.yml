name: 7d-platform

services:
  # =========================
  # IDENTITY & AUTH (2 instances)
  # =========================
  auth-1:
    container_name: 7d-auth-1
    build:
      context: .
      dockerfile: platform/identity-auth/Dockerfile.workspace
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${AUTH_POSTGRES_USER:-auth_user}:${AUTH_POSTGRES_PASSWORD:-auth_pass}@7d-auth-postgres:5432/${AUTH_POSTGRES_DB:-auth_db}
      NATS_URL: nats://platform:${NATS_AUTH_TOKEN:-dev-nats-token}@7d-nats:4222
      HOST: 0.0.0.0
      PORT: 8080
      JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM}
      JWT_KID: ${JWT_KID:-auth-key-1}
      ACCESS_TOKEN_TTL_MINUTES: "15"
      REFRESH_TOKEN_TTL_DAYS: "14"
      ARGON_MEMORY_KB: "65536"
      ARGON_ITERATIONS: "3"
      ARGON_PARALLELISM: "1"
      MAX_CONCURRENT_HASHES: "50"
      HASH_ACQUIRE_TIMEOUT_MS: "5000"
      LOCKOUT_THRESHOLD: "10"
      LOCKOUT_MINUTES: "15"
      LOGIN_PER_MIN_PER_EMAIL: "5"
      REGISTER_PER_MIN_PER_EMAIL: "5"
      REFRESH_PER_MIN_PER_TOKEN: "20"
      RUST_LOG: info,auth_rs=debug
    networks:
      - 7d-platform
    # Depends on auth-postgres and nats from 7d-infrastructure
    labels:
      com.7dsolutions.project: "platform"
      com.7dsolutions.tier: "platform"
      com.7dsolutions.component: "auth"
      com.7dsolutions.type: "api"
      com.7dsolutions.env: "dev"
      com.7dsolutions.instance: "1"
    develop:
      watch:
        - action: rebuild
          path: platform/identity-auth/src
        - action: rebuild
          path: Cargo.lock
        - action: rebuild
          path: platform/health/src
        - action: rebuild
          path: platform/security/src

  auth-2:
    container_name: 7d-auth-2
    build:
      context: .
      dockerfile: platform/identity-auth/Dockerfile.workspace
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${AUTH_POSTGRES_USER:-auth_user}:${AUTH_POSTGRES_PASSWORD:-auth_pass}@7d-auth-postgres:5432/${AUTH_POSTGRES_DB:-auth_db}
      NATS_URL: nats://platform:${NATS_AUTH_TOKEN:-dev-nats-token}@7d-nats:4222
      HOST: 0.0.0.0
      PORT: 8080
      JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM}
      JWT_KID: ${JWT_KID:-auth-key-1}
      ACCESS_TOKEN_TTL_MINUTES: "15"
      REFRESH_TOKEN_TTL_DAYS: "14"
      ARGON_MEMORY_KB: "65536"
      ARGON_ITERATIONS: "3"
      ARGON_PARALLELISM: "1"
      MAX_CONCURRENT_HASHES: "50"
      HASH_ACQUIRE_TIMEOUT_MS: "5000"
      LOCKOUT_THRESHOLD: "10"
      LOCKOUT_MINUTES: "15"
      LOGIN_PER_MIN_PER_EMAIL: "5"
      REGISTER_PER_MIN_PER_EMAIL: "5"
      REFRESH_PER_MIN_PER_TOKEN: "20"
      RUST_LOG: info,auth_rs=debug
    networks:
      - 7d-platform
    # Depends on auth-postgres and nats from 7d-infrastructure
    labels:
      com.7dsolutions.project: "platform"
      com.7dsolutions.tier: "platform"
      com.7dsolutions.component: "auth"
      com.7dsolutions.type: "api"
      com.7dsolutions.env: "dev"
      com.7dsolutions.instance: "2"
    develop:
      watch:
        - action: rebuild
          path: platform/identity-auth/src
        - action: rebuild
          path: Cargo.lock
        - action: rebuild
          path: platform/health/src
        - action: rebuild
          path: platform/security/src

  # =========================
  # CONTROL PLANE
  # =========================
  control-plane:
    container_name: 7d-control-plane
    build:
      context: .
      dockerfile: platform/control-plane/Dockerfile.workspace
    restart: unless-stopped
    ports:
      - "127.0.0.1:8091:8091"
    environment:
      DATABASE_URL: postgres://${TENANT_REGISTRY_POSTGRES_USER:-tenant_registry_user}:${TENANT_REGISTRY_POSTGRES_PASSWORD:-tenant_registry_pass}@7d-tenant-registry-postgres:5432/${TENANT_REGISTRY_POSTGRES_DB:-tenant_registry_db}
      AR_DATABASE_URL: postgres://${AR_POSTGRES_USER:-ar_user}:${AR_POSTGRES_PASSWORD:-ar_pass}@7d-ar-postgres:5432/${AR_POSTGRES_DB:-ar_db}
      PORT: 8091
      HOST: 0.0.0.0
      RUST_LOG: info
    networks:
      - 7d-platform
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/api/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      com.7dsolutions.project: "platform"
      com.7dsolutions.tier: "platform"
      com.7dsolutions.component: "control-plane"
      com.7dsolutions.type: "api"
      com.7dsolutions.env: "dev"
    develop:
      watch:
        - action: rebuild
          path: platform/control-plane/src
        - action: rebuild
          path: Cargo.lock
        - action: rebuild
          path: platform/health/src
        - action: rebuild
          path: platform/security/src

  # =========================
  # AUTH LOAD BALANCER
  # =========================
  auth-lb:
    container_name: 7d-auth-lb
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/auth-nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - 7d-platform
    depends_on:
      - auth-1
      - auth-2
    labels:
      com.7dsolutions.project: "platform"
      com.7dsolutions.tier: "platform"
      com.7dsolutions.component: "auth-lb"
      com.7dsolutions.type: "proxy"
      com.7dsolutions.env: "dev"

networks:
  7d-platform:
    name: 7d-platform
    external: true
