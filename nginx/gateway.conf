events {
  worker_connections 1024;
}

http {
  # ──────────────────────────────────────────────────────────
  # Rate-limit zones
  # ──────────────────────────────────────────────────────────
  # Auth-strict: login, register, forgot/reset-password (5 req/min per IP)
  limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=5r/m;

  # Auth-token: refresh, logout (20 req/min per IP)
  limit_req_zone $binary_remote_addr zone=auth_token:10m rate=20r/m;

  # API default: all other routes (120 req/min per IP+tenant)
  # Requests with X-Tenant-Id get an independent bucket per tenant-per-IP.
  # Requests without X-Tenant-Id share the IP-only bucket.
  map $http_x_tenant_id $rate_limit_key {
    default $binary_remote_addr$http_x_tenant_id;
    ""      $binary_remote_addr;
  }
  limit_req_zone $rate_limit_key zone=api_default:10m rate=120r/m;

  # Return 429 (not 503) when limit is hit
  limit_req_status 429;

  # Log rate-limit rejections
  log_format rate_limit '$remote_addr - $request - $status '
                        '[$time_local] tenant=$http_x_tenant_id';

  # ──────────────────────────────────────────────────────────
  # Upstreams
  # ──────────────────────────────────────────────────────────
  upstream auth_backend {
    server 7d-auth-1:8080;
    server 7d-auth-2:8080;
  }

  upstream control_plane_backend {
    server 7d-control-plane:8091;
  }

  upstream ar_backend {
    server 7d-ar:8086;
  }

  upstream gl_backend {
    server 7d-gl:8090;
  }

  upstream payments_backend {
    server 7d-payments:8088;
  }

  upstream subscriptions_backend {
    server 7d-subscriptions:8087;
  }

  upstream notifications_backend {
    server 7d-notifications:8089;
  }

  upstream inventory_backend {
    server 7d-inventory:8092;
  }

  upstream ap_backend {
    server 7d-ap:8093;
  }

  upstream treasury_backend {
    server 7d-treasury:8094;
  }

  upstream fixed_assets_backend {
    server 7d-fixed-assets:8104;
  }

  upstream consolidation_backend {
    server 7d-consolidation:8105;
  }

  upstream timekeeping_backend {
    server 7d-timekeeping:8097;
  }

  upstream party_backend {
    server 7d-party:8098;
  }

  upstream integrations_backend {
    server 7d-integrations:8099;
  }

  upstream ttp_backend {
    server 7d-ttp:8100;
  }

  upstream pdf_editor_backend {
    server 7d-pdf-editor:8102;
  }

  upstream maintenance_backend {
    server 7d-maintenance:8101;
  }

  upstream shipping_receiving_backend {
    server 7d-shipping-receiving:8103;
  }

  server {
    listen 80;
    server_name _;

    # ── Shared proxy headers ──────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # ── Custom 429 error page (JSON) ─────────────────────
    error_page 429 = @rate_limited;
    location @rate_limited {
      default_type application/json;
      add_header Retry-After 10 always;
      add_header X-RateLimit-Limit "see-zone" always;
      return 429 '{"error":"rate_limit_exceeded","message":"Too many requests. Please retry after the Retry-After period.","retry_after":10}';
    }

    # ── Health check (no rate limit) ─────────────────────
    location = /api/gateway/health {
      default_type application/json;
      return 200 '{"status":"ok","service":"gateway"}';
    }

    # ══════════════════════════════════════════════════════
    # AUTH — strict rate limits for brute-force targets
    # ══════════════════════════════════════════════════════

    # Login: 5 req/min per IP, burst of 2
    location = /api/auth/login {
      limit_req zone=auth_strict burst=2 nodelay;
      add_header X-RateLimit-Policy "auth_strict:5r/m" always;
      proxy_pass http://auth_backend;
    }

    # Register: 5 req/min per IP, burst of 2
    location = /api/auth/register {
      limit_req zone=auth_strict burst=2 nodelay;
      add_header X-RateLimit-Policy "auth_strict:5r/m" always;
      proxy_pass http://auth_backend;
    }

    # Forgot password: 5 req/min per IP, burst of 2
    location = /api/auth/forgot-password {
      limit_req zone=auth_strict burst=2 nodelay;
      add_header X-RateLimit-Policy "auth_strict:5r/m" always;
      proxy_pass http://auth_backend;
    }

    # Reset password: 5 req/min per IP, burst of 2
    location = /api/auth/reset-password {
      limit_req zone=auth_strict burst=2 nodelay;
      add_header X-RateLimit-Policy "auth_strict:5r/m" always;
      proxy_pass http://auth_backend;
    }

    # Refresh/logout: moderate limit (20 req/min per IP)
    location = /api/auth/refresh {
      limit_req zone=auth_token burst=5 nodelay;
      add_header X-RateLimit-Policy "auth_token:20r/m" always;
      proxy_pass http://auth_backend;
    }

    location = /api/auth/logout {
      limit_req zone=auth_token burst=5 nodelay;
      add_header X-RateLimit-Policy "auth_token:20r/m" always;
      proxy_pass http://auth_backend;
    }

    # All other auth routes: default API limit
    location /api/auth/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://auth_backend;
    }

    # ══════════════════════════════════════════════════════
    # MODULE ROUTES — default rate limits
    # ══════════════════════════════════════════════════════

    location /api/control/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://control_plane_backend;
    }

    location /api/ar/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://ar_backend;
    }

    location /api/gl/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://gl_backend;
    }

    location /api/payments/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://payments_backend;
    }

    location /api/bill-runs/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://subscriptions_backend;
    }

    location /api/inbox {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://notifications_backend;
    }

    location /api/dlq {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://notifications_backend;
    }

    location /api/inventory/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://inventory_backend;
    }

    location /api/ap/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://ap_backend;
    }

    location /api/treasury/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://treasury_backend;
    }

    location /api/fixed-assets/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://fixed_assets_backend;
    }

    location /api/consolidation/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://consolidation_backend;
    }

    location /api/timekeeping/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://timekeeping_backend;
    }

    location /api/party/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://party_backend;
    }

    location /api/ttp/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://ttp_backend;
    }

    location /api/maintenance/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://maintenance_backend;
    }

    location /api/shipping-receiving/ {
      limit_req zone=api_default burst=10 nodelay;
      add_header X-RateLimit-Policy "api_default:120r/m" always;
      proxy_pass http://shipping_receiving_backend;
    }

    # ── Catch-all: 404 ────────────────────────────────────
    location / {
      default_type application/json;
      return 404 '{"error":"not_found","message":"No upstream configured for this path."}';
    }
  }
}
