# docker-compose.production.yml — Production secrets overlay for application services.
#
# Usage:
#   docker compose -f docker-compose.services.yml -f docker-compose.production.yml up -d
#   docker compose -f docker-compose.platform.yml -f docker-compose.production.yml up -d
#
# Overrides application services to read secrets from Docker-mounted files
# instead of plaintext environment variables. See docs/SECRETS.md.
#
# For the data stack (NATS + Postgres), use docker-compose.production-data.yml.

secrets:
  jwt_private_key_pem:
    file: /etc/7d/production/secrets/jwt_private_key_pem
  jwt_public_key_pem:
    file: /etc/7d/production/secrets/jwt_public_key_pem
  nats_url:
    file: /etc/7d/production/secrets/nats_url
  tilled_webhook_secret:
    file: /etc/7d/production/secrets/tilled_webhook_secret

  auth_database_url:
    file: /etc/7d/production/secrets/auth_database_url
  ar_database_url:
    file: /etc/7d/production/secrets/ar_database_url
  subscriptions_database_url:
    file: /etc/7d/production/secrets/subscriptions_database_url
  payments_database_url:
    file: /etc/7d/production/secrets/payments_database_url
  notifications_database_url:
    file: /etc/7d/production/secrets/notifications_database_url
  gl_database_url:
    file: /etc/7d/production/secrets/gl_database_url
  inventory_database_url:
    file: /etc/7d/production/secrets/inventory_database_url
  ap_database_url:
    file: /etc/7d/production/secrets/ap_database_url
  treasury_database_url:
    file: /etc/7d/production/secrets/treasury_database_url
  fixed_assets_database_url:
    file: /etc/7d/production/secrets/fixed_assets_database_url
  consolidation_database_url:
    file: /etc/7d/production/secrets/consolidation_database_url
  timekeeping_database_url:
    file: /etc/7d/production/secrets/timekeeping_database_url
  party_database_url:
    file: /etc/7d/production/secrets/party_database_url
  integrations_database_url:
    file: /etc/7d/production/secrets/integrations_database_url
  ttp_database_url:
    file: /etc/7d/production/secrets/ttp_database_url
  pdf_editor_database_url:
    file: /etc/7d/production/secrets/pdf_editor_database_url
  maintenance_database_url:
    file: /etc/7d/production/secrets/maintenance_database_url
  shipping_receiving_database_url:
    file: /etc/7d/production/secrets/shipping_receiving_database_url
  tenant_registry_database_url:
    file: /etc/7d/production/secrets/tenant_registry_database_url
  control_plane_ar_database_url:
    file: /etc/7d/production/secrets/control_plane_ar_database_url

services:
  auth-1:
    entrypoint: ["/usr/local/bin/secrets-entrypoint.sh"]
    command: ["identity-auth"]
    volumes:
      - ./scripts/docker-secrets-entrypoint.sh:/usr/local/bin/secrets-entrypoint.sh:ro
    secrets:
      - source: auth_database_url
        target: DATABASE_URL
      - source: nats_url
        target: NATS_URL
      - source: jwt_private_key_pem
        target: JWT_PRIVATE_KEY_PEM
      - source: jwt_public_key_pem
        target: JWT_PUBLIC_KEY_PEM

  auth-2:
    entrypoint: ["/usr/local/bin/secrets-entrypoint.sh"]
    command: ["identity-auth"]
    volumes:
      - ./scripts/docker-secrets-entrypoint.sh:/usr/local/bin/secrets-entrypoint.sh:ro
    secrets:
      - source: auth_database_url
        target: DATABASE_URL
      - source: nats_url
        target: NATS_URL
      - source: jwt_private_key_pem
        target: JWT_PRIVATE_KEY_PEM
      - source: jwt_public_key_pem
        target: JWT_PUBLIC_KEY_PEM

  control-plane:
    entrypoint: ["/usr/local/bin/secrets-entrypoint.sh"]
    command: ["control-plane"]
    volumes:
      - ./scripts/docker-secrets-entrypoint.sh:/usr/local/bin/secrets-entrypoint.sh:ro
    secrets:
      - source: tenant_registry_database_url
        target: DATABASE_URL
      - source: control_plane_ar_database_url
        target: AR_DATABASE_URL

  ar:
    entrypoint: ["/usr/local/bin/secrets-entrypoint.sh"]
    command: ["ar-rs"]
    volumes:
      - ./scripts/docker-secrets-entrypoint.sh:/usr/local/bin/secrets-entrypoint.sh:ro
    secrets:
      - source: ar_database_url
        target: DATABASE_URL
      - source: nats_url
        target: NATS_URL
      - source: tilled_webhook_secret
        target: TILLED_WEBHOOK_SECRET

  subscriptions:
