# docker-compose.production.yml — Production secrets overlay.
#
# Usage (always combined with base compose files):
#   docker compose -f docker-compose.data.yml    -f docker-compose.production.yml up -d
#   docker compose -f docker-compose.services.yml -f docker-compose.production.yml up -d
#
# This overlay:
#   1. Defines Docker secrets sourced from /etc/7d/production/secrets/
#   2. Mounts relevant secrets into each service at /run/secrets/<ENV_VAR_NAME>
#   3. Overrides the entrypoint to read secret files into env vars before exec
#
# Secret files are individual files, one value per file, stored at:
#   /etc/7d/production/secrets/<name>
# Each file is root:root 0600. See docs/SECRETS.md for the full workflow.
#
# Local dev is UNAFFECTED — this file is only used in production deploys.

secrets:
  # --- Shared secrets ---
  jwt_private_key_pem:
    file: /etc/7d/production/secrets/jwt_private_key_pem
  jwt_public_key_pem:
    file: /etc/7d/production/secrets/jwt_public_key_pem
  nats_auth_token:
    file: /etc/7d/production/secrets/nats_auth_token
