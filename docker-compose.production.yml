        target: DATABASE_URL
      - source: nats_url
        target: NATS_URL
      - source: jwt_private_key_pem
        target: JWT_PRIVATE_KEY_PEM
      - source: jwt_public_key_pem
        target: JWT_PUBLIC_KEY_PEM

  auth-lb:
    image: ${NGINX_AUTH_LB_IMAGE:?Set NGINX_AUTH_LB_IMAGE in .env.release}

  gateway:
