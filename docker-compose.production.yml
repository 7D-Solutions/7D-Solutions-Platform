
# Production overlay:
# - leaves docker-compose.services.yml unchanged for dev build workflows
# - pins runtime to immutable image tags for reproducible deploys/rollbacks
# Usage:
#   docker compose -f docker-compose.services.yml -f docker-compose.production.yml up -d

services:
  auth-1:
    image: ${IDENTITY_AUTH_IMAGE:-7dsolutions/identity-auth:phase66-d3b0e8932887}

  auth-2:
    image: ${IDENTITY_AUTH_IMAGE:-7dsolutions/identity-auth:phase66-d3b0e8932887}

  auth-lb:
    image: ${AUTH_LB_IMAGE:-nginx:alpine}
    cap_add:
      - CHOWN

  gateway:
    image: ${GATEWAY_IMAGE:-nginx:alpine}
    cap_add:
