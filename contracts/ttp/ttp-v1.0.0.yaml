openapi: 3.0.3
info:
  title: TTP (Tenant-to-Party) API
  version: 1.0.0
  description: >
    Tenant-to-Party (TTP) module — version 1.0.0.

    Manages metered usage events, billing runs, and service agreements for
    each tenant's parties. TTP is the bridge between platform-level provisioning
    (tenant identity, plan assignment) and the AR module (invoice creation).

    Auth model: internal service-to-service (no platform_admin JWT required).
    All endpoints are assumed to be called from within the platform network.

servers:
  - url: http://localhost:8100
    description: Local development
  - url: https://ttp.7dsolutions.io
    description: Production

paths:
  # ── Operations / health ──────────────────────────────────────────────────
  /healthz:
    get:
      summary: Liveness probe
      operationId: healthz
      tags: [ops]
      responses:
        '200':
          description: Service alive

  /api/health:
    get:
      summary: Health check
      operationId: health
      tags: [ops]
      responses:
        '200':
          description: Service health summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/ready:
    get:
      summary: Readiness probe (checks DB connectivity)
      operationId: ready
      tags: [ops]
      responses:
        '200':
          description: Service ready — all dependencies reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Service not ready — one or more dependencies unreachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'

  /api/version:
    get:
      summary: Module version info
      operationId: version
      tags: [ops]
      responses:
        '200':
          description: Module identity and schema version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'

  /metrics:
    get:
      summary: Prometheus metrics scrape endpoint
      operationId: metrics
      tags: [ops]
      responses:
        '200':
          description: Prometheus text format metrics
          content:
            text/plain:
              schema:
                type: string

  # ── Billing runs ─────────────────────────────────────────────────────────
  /api/ttp/billing-runs:
    post:
      summary: Trigger a billing run for a tenant
      operationId: createBillingRun
      description: >
        Processes all active service agreements for a tenant in the given billing period.
        Idempotent: re-calling with the same (tenant_id, billing_period) is a no-op
        (returns was_noop: true).

        Requires tenant to exist in tenant-registry with a non-null app_id.
      tags: [billing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingRunRequest'
      responses:
        '200':
          description: Billing run completed (or already completed — see was_noop)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingRunResponse'
        '400':
          description: Validation error (invalid billing_period format or empty idempotency_key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '404':
          description: Tenant not found in registry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '422':
          description: Tenant exists but has no app_id assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '500':
          description: Billing run failed (DB error or downstream failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  # ── Metering ─────────────────────────────────────────────────────────────
  /api/metering/events:
    post:
      summary: Ingest metering events (batch, idempotent)
      operationId: ingestMeteringEvents
      description: >
        Ingest one or more metering events for a tenant. Each event carries an
        idempotency_key; duplicate keys for the same tenant are silently ignored.
        All events in the batch are validated before any are written.
      tags: [metering]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestEventRequest'
      responses:
        '200':
          description: Events processed (check was_duplicate per item)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestEventResponse'
        '400':
          description: Validation error (empty events array, bad dimension, non-positive quantity)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '500':
          description: Ingestion failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/metering/trace:
    get:
      summary: Compute deterministic price trace for a tenant + period
      operationId: getMeteringTrace
      description: >
        Returns the full price breakdown for a tenant in a billing period.
        Aggregates usage events by dimension and applies pricing rules effective
        at the period start date. Output is deterministic: same inputs → same result.
      tags: [metering]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the tenant
        - name: period
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d{4}-(0[1-9]|1[0-2])$'
          description: Billing period in YYYY-MM format (e.g. "2026-02")
      responses:
        '200':
          description: Price trace computed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceTrace'
        '400':
          description: Invalid period format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '500':
          description: Trace computation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  # ── Service agreements ───────────────────────────────────────────────────
  /api/ttp/service-agreements:
    get:
      summary: List service agreements for a tenant
      operationId: listServiceAgreements
      description: >
        Returns all service agreements (billing plans) for a tenant, optionally
        filtered by status. Default status filter is "active".
        Results are ordered by plan_code then agreement_id for deterministic output.
      tags: [service-agreements]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the tenant
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, suspended, cancelled, all]
            default: active
          description: Filter by agreement status; "all" returns every status
      responses:
        '200':
          description: Service agreements list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListServiceAgreementsResponse'
        '400':
          description: Invalid status value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '500':
          description: Database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

components:
  schemas:
    # ── Requests ─────────────────────────────────────────────────────────
    BillingRunRequest:
      type: object
      required:
        - tenant_id
        - billing_period
        - idempotency_key
      properties:
        tenant_id:
          type: string
          format: uuid
          description: UUID of the tenant to bill
        billing_period:
          type: string
          pattern: '^\d{4}-(0[1-9]|1[0-2])$'
          description: Period to bill in YYYY-MM format (e.g. "2026-02")
          example: "2026-02"
        idempotency_key:
          type: string
          minLength: 1
          description: Caller-supplied key for idempotent re-tries; must not be empty

    IngestEventRequest:
      type: object
      required:
        - tenant_id
        - events
      properties:
        tenant_id:
          type: string
          format: uuid
          description: UUID of the tenant
        events:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/EventItem'

    EventItem:
      type: object
      required:
        - dimension
        - quantity
        - occurred_at
        - idempotency_key
      properties:
        dimension:
          type: string
          minLength: 1
          description: Metered dimension name (e.g. "api_calls", "seats")
        quantity:
          type: integer
          format: int64
          minimum: 1
          description: Usage quantity (must be positive)
        occurred_at:
          type: string
          format: date-time
          description: When the usage occurred (ISO-8601 UTC)
        idempotency_key:
          type: string
          minLength: 1
          description: Per-event deduplication key; duplicate keys for same tenant are silently ignored
        source_ref:
          type: string
          nullable: true
          description: Optional reference to the source record that generated this event

    # ── Responses ────────────────────────────────────────────────────────
    BillingRunResponse:
      type: object
      required:
        - run_id
        - tenant_id
        - billing_period
        - parties_billed
        - total_amount_minor
        - currency
        - was_noop
      properties:
        run_id:
          type: string
          format: uuid
          description: Stable identifier for this billing run
        tenant_id:
          type: string
          format: uuid
        billing_period:
          type: string
          description: Period that was billed
        parties_billed:
          type: integer
          format: int32
          description: Number of parties (customers) for whom invoices were created
        total_amount_minor:
          type: integer
          format: int64
          description: Total billed amount in minor currency units (e.g. cents)
        currency:
          type: string
          description: ISO-4217 currency code (e.g. "usd")
        was_noop:
          type: boolean
          description: True if billing had already been run for this period (idempotent replay)

    IngestEventResponse:
      type: object
      required:
        - ingested
        - duplicates
        - results
      properties:
        ingested:
          type: integer
          format: int32
          description: Number of new events written
        duplicates:
          type: integer
          format: int32
          description: Number of events skipped as duplicates
        results:
          type: array
          items:
            $ref: '#/components/schemas/IngestResultItem'

    IngestResultItem:
      type: object
      required:
        - idempotency_key
        - was_duplicate
      properties:
        idempotency_key:
          type: string
        event_id:
          type: string
          format: uuid
          nullable: true
          description: UUID of the stored event; null if was_duplicate is true
        was_duplicate:
          type: boolean

    PriceTrace:
      type: object
      required:
        - tenant_id
        - period
        - period_start
        - period_end
        - line_items
        - total_minor
        - currency
      properties:
        tenant_id:
          type: string
          format: uuid
        period:
          type: string
          description: Billing period (YYYY-MM)
        period_start:
          type: string
          format: date
          description: First day of the period (inclusive)
        period_end:
          type: string
          format: date
          description: First day of the next period (exclusive)
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/TraceLineItem'
        total_minor:
          type: integer
          format: int64
          description: Sum of all line totals in minor currency units
        currency:
          type: string
          description: ISO-4217 currency code

    TraceLineItem:
      type: object
      required:
        - dimension
        - total_quantity
        - event_count
        - unit_price_minor
        - currency
        - line_total_minor
      properties:
        dimension:
          type: string
        total_quantity:
          type: integer
          format: int64
          description: Sum of all event quantities for this dimension in the period
        event_count:
          type: integer
          format: int64
          description: Number of events contributing to this dimension
        unit_price_minor:
          type: integer
          format: int64
          description: Price per unit in minor currency units
        currency:
          type: string
        line_total_minor:
          type: integer
          format: int64
          description: total_quantity * unit_price_minor (no rounding)

    ListServiceAgreementsResponse:
      type: object
      required:
        - tenant_id
        - items
        - count
      properties:
        tenant_id:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: '#/components/schemas/ServiceAgreementItem'
        count:
          type: integer
          description: Total number of items returned

    ServiceAgreementItem:
      type: object
      required:
        - agreement_id
        - party_id
        - plan_code
        - amount_minor
        - currency
        - billing_cycle
        - status
        - effective_from
      properties:
        agreement_id:
          type: string
          format: uuid
        party_id:
          type: string
          format: uuid
        plan_code:
          type: string
          description: Billing plan code (e.g. "starter", "professional")
        amount_minor:
          type: integer
          format: int64
          description: Billed amount in minor currency units
        currency:
          type: string
          description: ISO-4217 currency code
        billing_cycle:
          type: string
          description: Billing frequency (e.g. "monthly", "annual")
        status:
          type: string
          enum: [active, suspended, cancelled]
        effective_from:
          type: string
          format: date
          description: Date from which this agreement is effective
        effective_to:
          type: string
          format: date
          nullable: true
          description: Date on which this agreement ends; null if still active

    # ── Ops responses ────────────────────────────────────────────────────
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          description: Overall health status

    ReadyResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string
        checks:
          type: array
          items:
            type: object

    VersionResponse:
      type: object
      required:
        - module_name
        - module_version
        - schema_version
      properties:
        module_name:
          type: string
          example: ttp
        module_version:
          type: string
          example: "1.0.0"
        schema_version:
          type: string
          description: Database schema migration version

    ErrorBody:
      type: object
      required:
        - error
        - code
      properties:
        error:
          type: string
          description: Human-readable error description
        code:
          type: string
          description: Machine-readable error code (e.g. "validation_error", "tenant_not_found")
