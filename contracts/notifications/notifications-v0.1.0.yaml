openapi: 3.0.3
info:
  title: Notifications API
  version: 0.1.0
  description: |
    Notifications module — compliance-grade notification infrastructure with
    versioned templates, delivery receipts, and full audit trail.

    **Ownership Boundaries:**
    - Owns: notification_templates (versioned), notification_sends, delivery_receipts
    - Does NOT own: financial logic, customer master data, invoice state

    **Key Principles:**
    - Never drives financial decisions
    - No cross-module DB access
    - Compliance proof via rendered content hash + delivery receipts
    - Template versioning: publishing always creates a new version
    - Event-driven: all mutations emit outbox events atomically

    **Auth model:** JWT-based. Tenant ID extracted from verified claims.

servers:
  - url: https://notifications.7dsolutions.io
    description: Production
  - url: http://localhost:8089
    description: Local development

paths:
  /api/health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [ops]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  module:
                    type: string
                    example: notifications
                  version:
                    type: string
                    example: 0.1.0

  # ── Versioned Templates (Phase 67) ──────────────────────────────────────
  /api/templates:
    post:
      summary: Publish a new template version
      operationId: publishTemplate
      tags: [templates]
      description: |
        Create a new version of a notification template. Each template_key can have
        multiple versions. The latest version is resolved automatically on send.
        Emits notifications.events.template.published event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '201':
          description: Template version published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/templates/{key}:
    get:
      summary: Get template (latest version + version history)
      operationId: getTemplate
      tags: [templates]
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Template key (e.g. "invoice_reminder")
      responses:
        '200':
          description: Template with latest version and version history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateDetailResponse'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Notification Sends (Phase 67) ───────────────────────────────────────
  /api/notifications/send:
    post:
      summary: Send a notification
      operationId: sendNotification
      tags: [sends]
      description: |
        Send a notification to one or more recipients using a versioned template.
        Resolves the latest template version, renders content, creates compliance
        records (send + delivery receipts per recipient), and emits delivery events.
        Returns 201 with the send record including rendered content hash.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendRequest'
      responses:
        '201':
          description: Notification sent with delivery receipts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendResponse'
        '400':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Template validation failed (missing required variables)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/notifications/{id}:
    get:
      summary: Get send detail with delivery receipts
      operationId: getSendDetail
      tags: [sends]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Notification send ID
      responses:
        '200':
          description: Send detail with all delivery receipts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendDetailResponse'
        '404':
          description: Send not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Delivery Receipts (Phase 67) ────────────────────────────────────────
  /api/deliveries:
    get:
      summary: Query delivery receipts
      operationId: queryDeliveries
      tags: [deliveries]
      description: |
        Query delivery receipts with optional filters by correlation ID, recipient,
        and time range. Returns compliance-grade proof of who was notified, when,
        via which channel, and the outcome.
      parameters:
        - name: correlation_id
          in: query
          schema:
            type: string
          description: Filter by correlation ID
        - name: recipient
          in: query
          schema:
            type: string
          description: Filter by recipient address
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Start of time range
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: End of time range
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of delivery receipts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryListResponse'

components:
  schemas:
    # ── Template schemas ──────────────────────────────────────────────────
    CreateTemplateRequest:
      type: object
      required: [template_key, channel, subject, body, required_vars]
      properties:
        template_key:
          type: string
          description: Unique key for this template family (e.g. "invoice_reminder")
        channel:
          type: string
          enum: [email, sms, inbox, webhook]
        subject:
          type: string
          description: Template subject line (supports {{variable}} interpolation)
        body:
          type: string
          description: Template body (supports {{variable}} interpolation)
        required_vars:
          type: array
          items:
            type: string
          description: List of variable names required for rendering

    TemplateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        template_key:
          type: string
        version:
          type: integer
          description: Auto-incremented version number
        channel:
          type: string
        subject:
          type: string
        body:
          type: string
        required_vars:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    TemplateDetailResponse:
      type: object
      properties:
        latest:
          $ref: '#/components/schemas/TemplateResponse'
        versions:
          type: array
          items:
            $ref: '#/components/schemas/TemplateVersionSummary'

    TemplateVersionSummary:
      type: object
      properties:
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          nullable: true

    # ── Send schemas ──────────────────────────────────────────────────────
    SendRequest:
      type: object
      required: [template_key, channel, recipients, payload_json]
      properties:
        template_key:
          type: string
          description: Template to use (latest version resolved automatically)
        channel:
          type: string
          enum: [email, sms, inbox, webhook]
        recipients:
          type: array
          items:
            type: string
          description: List of recipient addresses
        payload_json:
          type: object
          additionalProperties: true
          description: Template variable values for rendering
        correlation_id:
          type: string
          nullable: true
          description: Optional correlation ID for tracing
        causation_id:
          type: string
          nullable: true
          description: Optional causation ID for event chain tracking

    SendResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, delivering, delivered, partially_failed, failed]
        template_key:
          type: string
        template_version:
          type: integer
        channel:
          type: string
        rendered_hash:
          type: string
          nullable: true
          description: Hash of rendered content for compliance proof
        receipt_count:
          type: integer
          description: Number of delivery receipts created

    SendDetailResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        template_key:
          type: string
        template_version:
          type: integer
        channel:
          type: string
        rendered_hash:
          type: string
          nullable: true
        correlation_id:
          type: string
          nullable: true
        receipts:
          type: array
          items:
            $ref: '#/components/schemas/DeliveryReceipt'
        created_at:
          type: string
          format: date-time

    # ── Delivery Receipt schemas ──────────────────────────────────────────
    DeliveryReceipt:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
        send_id:
          type: string
          format: uuid
        recipient:
          type: string
        channel:
          type: string
        status:
          type: string
          enum: [pending, attempted, succeeded, failed, dlq]
        provider_id:
          type: string
          nullable: true
          description: External provider message reference
        attempt_count:
          type: integer
        last_attempt_at:
          type: string
          format: date-time
          nullable: true
        succeeded_at:
          type: string
          format: date-time
          nullable: true
        failed_at:
          type: string
          format: date-time
          nullable: true
        error_class:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DeliveryListResponse:
      type: object
      properties:
        receipts:
          type: array
          items:
            $ref: '#/components/schemas/DeliveryReceipt'

    # ── Common ────────────────────────────────────────────────────────────
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
