openapi: 3.0.3
info:
  title: Accounts Receivable API
  version: 1.0.0
  description: 'Accounts Receivable module — version 1.0.0 (proven 2026-02-22, bead bd-rqbr).


    Manages billing records, payment method references, aging, dunning, reconciliation,
    credit notes, write-offs, usage billing, tax configuration, and GL journal emission.


    No raw card data, API keys, gateway credentials, or sensitive secrets are accepted
    or stored. Sensitive payment processing is delegated to the Payments module.'
servers:
- url: https://ar.7dsolutions.io
  description: Production
- url: http://localhost:8086
  description: Local development
