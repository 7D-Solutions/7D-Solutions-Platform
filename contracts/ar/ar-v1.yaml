components:
  schemas:
    Customer:
      type: object
      required:
      - id
      - email
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
    CreateCustomerRequest:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
        name:
          type: string
    UpdateCustomerRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
    Subscription:
      type: object
      required:
      - id
      - customer_id
      - status
      properties:
        id:
          type: string
        customer_id:
          type: string
        status:
          type: string
        interval:
          type: string
        amount:
          type: integer
    CreateSubscriptionRequest:
      type: object
      required:
      - customer_id
      properties:
        customer_id:
          type: string
        interval:
          type: string
        amount:
          type: integer
    UpdateSubscriptionRequest:
      type: object
      properties:
        interval:
          type: string
        amount:
          type: integer
    CancelSubscriptionRequest:
      type: object
      properties:
        reason:
          type: string
    Invoice:
      type: object
      required:
      - id
      - customer_id
      - status
      properties:
        id:
          type: string
        customer_id:
          type: string
        status:
          type: string
        amount_due:
          type: integer
    CreateInvoiceRequest:
      type: object
      required:
      - customer_id
      properties:
        customer_id:
          type: string
        amount_due:
          type: integer
    UpdateInvoiceRequest:
      type: object
      properties:
        amount_due:
          type: integer
    FinalizeInvoiceRequest:
      type: object
      properties:
        auto_advance:
          type: boolean
    Charge:
      type: object
      required:
      - id
      - amount
      - status
      properties:
        id:
          type: string
        amount:
          type: integer
        status:
          type: string
        customer_id:
          type: string
    CreateChargeRequest:
      type: object
      required:
      - amount
      properties:
        amount:
          type: integer
        customer_id:
          type: string
        payment_method_id:
          type: string
    CaptureChargeRequest:
      type: object
      properties:
        amount:
          type: integer
    Refund:
      type: object
      required:
      - id
      - charge_id
      - amount
      properties:
        id:
          type: string
        charge_id:
          type: string
        amount:
          type: integer
        status:
          type: string
    CreateRefundRequest:
      type: object
      required:
      - charge_id
      properties:
        charge_id:
          type: string
        amount:
          type: integer
        reason:
          type: string
    Dispute:
      type: object
      required:
      - id
      - charge_id
      - status
      properties:
        id:
          type: string
        charge_id:
          type: string
        status:
          type: string
        reason:
          type: string
    SubmitDisputeEvidenceRequest:
      type: object
      required:
      - evidence
      properties:
        evidence:
          type: string
    PaymentMethod:
      type: object
      required:
      - id
      - customer_id
      - type
      properties:
        id:
          type: string
        customer_id:
          type: string
        type:
          type: string
        is_default:
          type: boolean
    AddPaymentMethodRequest:
      type: object
      required:
      - customer_id
      - type
      properties:
        customer_id:
          type: string
        type:
          type: string
        token:
          type: string
    UpdatePaymentMethodRequest:
      type: object
      properties:
        is_default:
          type: boolean
    Webhook:
      type: object
      required:
      - id
      - event_type
      - status
      properties:
        id:
          type: string
        event_type:
          type: string
        status:
          type: string
        payload:
          type: object
    ReplayWebhookRequest:
      type: object
      properties:
        force:
          type: boolean
    Event:
      type: object
      required:
      - id
      - event_type
      properties:
        id:
          type: string
        event_type:
          type: string
        data:
          type: object
        created_at:
          type: string
          format: date-time
